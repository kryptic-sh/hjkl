[package]
name = "hjkl"
description = "Vim-modal terminal editor: standalone TUI built on the hjkl engine."
keywords = ["vim", "modal", "editor", "tui", "ratatui"]
categories = ["text-editors", "command-line-utilities"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
rust-version.workspace = true
readme = "README.md"

[[bin]]
name = "hjkl"
path = "src/main.rs"

[dependencies]
hjkl-buffer = { path = "../../crates/hjkl-buffer", version = "=0.2.0" }
hjkl-engine = { path = "../../crates/hjkl-engine", version = "=0.2.0" }
hjkl-editor = { path = "../../crates/hjkl-editor", version = "=0.2.0" }
hjkl-ratatui = { path = "../../crates/hjkl-ratatui", version = "=0.2.0" }
hjkl-tree-sitter = { path = "../../crates/hjkl-tree-sitter", version = "=0.2.0" }
hjkl-clipboard = { path = "../../crates/hjkl-clipboard", version = "=0.2.0" }
hjkl-form = { path = "../../crates/hjkl-form", version = "=0.2.0" }
ratatui = "0.29"
crossterm = "0.28"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
regex = "1"
git2 = { version = "0.19", default-features = false }

[dev-dependencies]
tempfile = "3"

[[example]]
name = "form_demo"
path = "examples/form_demo.rs"
