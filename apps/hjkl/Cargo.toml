[package]
name = "hjkl"
description = "Vim-modal terminal editor: standalone TUI built on the hjkl engine."
keywords = ["vim", "modal", "editor", "tui", "ratatui"]
categories = ["text-editors", "command-line-utilities"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
rust-version.workspace = true
readme = "README.md"

[[bin]]
name = "hjkl"
path = "src/main.rs"

[dependencies]
hjkl-buffer = "0.3"
hjkl-engine = "0.3"
hjkl-editor = "0.3"
hjkl-ratatui = "0.3"
hjkl-tree-sitter = "0.3"
hjkl-clipboard = "0.3"
hjkl-form = "0.3"
hjkl-picker = "0.3"
ratatui = "0.30"
crossterm = "0.29"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
regex = "1"
git2 = { version = "0.20", default-features = false }
ignore = "0.4"
ec4rs = "1"

[dev-dependencies]
tempfile = "3"

[[example]]
name = "form_demo"
path = "examples/form_demo.rs"
