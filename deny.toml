# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = [
  # `tokio-io` is unmaintained (Tokio 0.1 era); pulled transitively
  # via futures-util via nvim-rs into the workspace-only,
  # publish = false `hjkl-compat-oracle` test crate. Not redistributed
  # in any released hjkl artifact.
  { id = "RUSTSEC-2026-0058", reason = "transitive via nvim-rs in test-only crate" },
  # `ttf-parser` is unmaintained (RUSTSEC-2026-0192); pulled
  # transitively through floem's GUI rendering stack (fontdb →
  # usvg → resvg). Only affects the experimental hjkl-gui binary;
  # the TUI binary does not link it. Migration to skrifa needs to
  # happen upstream in floem.
  { id = "RUSTSEC-2026-0192", reason = "transitive via floem GUI stack; not in TUI binary" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]
exceptions = [
  # nvim-rs declares the deprecated SPDX short-form "LGPL-3.0";
  # pulled only by the workspace-only, publish = false
  # `hjkl-compat-oracle` test crate. Not redistributed in any
  # released hjkl artifact.
  { allow = ["LGPL-3.0"], crate = "nvim-rs" },
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
