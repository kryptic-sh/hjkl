[workspace]
# Lockstep version: all crates bump together until 0.1.0+ when they may diverge.
dependencies_update = true
changelog_update = true
git_release_enable = true
git_tag_enable = true
publish = true

# Keep a Changelog format
changelog_config = ".github/keep-a-changelog.toml"

[[package]]
name = "hjkl-engine"
[[package]]
name = "hjkl-buffer"
[[package]]
name = "hjkl-editor"
[[package]]
name = "hjkl-ratatui"
