name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features
      - run: cargo test --workspace --doc --all-features
      - name: Build examples
        run: cargo build --workspace --examples --all-features
        # `--examples` is a no-op until examples land; harmless before then.

  no_std:
    name: no_std + wasm smoke (deferred)
    runs-on: ubuntu-latest
    # hjkl-engine pulls ratatui+crossterm unconditionally until phase 5 lands
    # the engine-native Style type + trait extraction (per SPEC). Keep this
    # job as a non-blocking signal so re-enabling it post-refactor is one
    # line. Re-enable by removing `continue-on-error: true` and unblocking
    # the steps.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p hjkl-buffer --no-default-features
      - run: cargo build -p hjkl-buffer --no-default-features --target wasm32-unknown-unknown

  beta:
    name: test (beta, non-blocking)
    runs-on: ubuntu-latest
    # MSRV tracks current stable. Beta is briefly behind stable between
    # release promotions, which can fail the rust-version check. Run for
    # forward-compat signal only; do not block PRs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@beta
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features
