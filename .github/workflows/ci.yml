name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Allow release.yml (and other workflows) to gate on this entire suite
  # by calling it as a reusable workflow.
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# When BCTP pushes a `chore: bump version` commit to main, the same SHA is
# tag-pushed moments later — release.yml fires and invokes this workflow as
# a gate. Skip the standalone main-push run for that exact commit subject so
# CI doesn't execute twice on the same SHA. Disambiguation:
#   - main-push of bump commit  → ref=refs/heads/main, msg=chore: bump… → SKIP
#   - tag-push via release.yml  → ref=refs/tags/vX.Y.Z                  → RUN
#   - PR / direct main push     → other event, or different msg          → RUN

jobs:
  fmt:
    name: rustfmt
    if: "${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: bump version')) }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    if: "${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: bump version')) }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test ${{ matrix.os }}
    if: "${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: bump version')) }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features
      - run: cargo test --workspace --doc --all-features
      - name: Build examples
        run: cargo build --workspace --examples --all-features
        # `--examples` is a no-op until examples land; harmless before then.

  no_std:
    name: no_std + wasm smoke (deferred)
    if: "${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: bump version')) }}"
    runs-on: ubuntu-latest
    # hjkl-engine pulls ratatui+crossterm unconditionally until phase 5 lands
    # the engine-native Style type + trait extraction (per SPEC). Keep this
    # job as a non-blocking signal so re-enabling it post-refactor is one
    # line. Re-enable by removing `continue-on-error: true` and unblocking
    # the steps.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p hjkl-buffer --no-default-features
      - run: cargo build -p hjkl-buffer --no-default-features --target wasm32-unknown-unknown

  # 'beta' job removed: MSRV tracks current stable, so beta is
  # frequently behind the workspace rust-version. Forward-compat signal
  # comes from the cron job's nightly fuzz/miri runs instead. Re-add
  # when MSRV is held a release behind stable.
