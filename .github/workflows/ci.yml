name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '-D warnings'

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo test --doc --all-features

  musl-test:
    name: test ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --target ${{ matrix.target }} --all-features
      - run: cargo test --doc --target ${{ matrix.target }} --all-features

  # Real-compositor test: spawn sway in headless wlroots mode and verify our
  # bind handshake against ext_data_control_manager_v1 actually completes.
  # Mock unit tests can't catch wire-protocol bugs like the FIRST_CLIENT_ID
  # mismatch that broke Hyprland users in 0.4.7.
  #
  # Runs in archlinux:latest because Ubuntu 24.04 ships sway 1.9 /
  # wlroots 0.17 which predates ext_data_control_manager_v1; arch has
  # sway 1.11 / wlroots 0.18+ that exposes the protocol our backend uses.
  sway-integration:
    name: sway headless integration
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install deps
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed rust cargo sway git libcap
          # Arch's /usr/bin/sway ships with file capabilities that the GHA
          # runner can't grant inside the container, so it refuses to exec
          # with "Operation not permitted". Strip them — headless mode
          # doesn't need any of them.
          setcap -r /usr/bin/sway || true
          sway --version
          rustc --version
      - uses: actions/checkout@v6
      - name: Run wayland_sway integration test
        run: cargo test --test wayland_sway -- --nocapture

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
