name: Cron

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # rust-toolchain.toml at the repo root pins the stable channel for
  # local dev. Cron jobs that need a different channel (nightly for
  # miri / cargo-fuzz, musl for cargo-deny) override via RUSTUP_TOOLCHAIN.
  # Without this, rustup refuses to install the requested channel
  # because the in-repo toolchain file claims authority.

jobs:
  miri:
    name: miri (hjkl-buffer)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: nightly
      # proptest stores regression seeds in a directory it discovers
      # via `getcwd`. miri rejects libc syscalls when isolated; flip
      # to warn-mode so the syscall returns an error code and the
      # regression reload skips gracefully.
      MIRIFLAGS: -Zmiri-isolation-error=warn
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: cargo miri test -p hjkl-buffer --all-features

  fuzz:
    name: cargo-fuzz (10 min per harness)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        # No --locked: cargo-fuzz's published Cargo.lock pins an old rustix
        # that uses internal `rustc_layout_scalar_valid_range_*` attributes
        # rejected by current nightly. Letting cargo resolve newer deps
        # avoids the build break.
        run: cargo install cargo-fuzz
      - name: Discover and run fuzz targets
        run: |
          if [ -d crates/hjkl-engine/fuzz ]; then
            cd crates/hjkl-engine/fuzz
            for target in $(cargo fuzz list); do
              echo "::group::fuzz $target"
              cargo fuzz run "$target" -- -max_total_time=600
              echo "::endgroup::"
            done
          else
            echo "no fuzz targets yet — skipping"
          fi

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - run: cargo deny --all-features check

  bench:
    name: criterion vs main baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benches if present
        run: |
          if grep -rq "\[\[bench\]\]" crates/; then
            cargo bench --workspace
          else
            echo "no benches yet — skipping"
          fi

  wasm_size:
    name: wasm bundle size (deferred)
    runs-on: ubuntu-latest
    # hjkl-engine pulls ratatui + crossterm unconditionally until
    # phase 4 trait extraction lands the engine-native Style + Host
    # rewrite. crossterm is unix-only, so the wasm build can't
    # complete. Keep the harness around as continue-on-error so
    # re-enabling once decoupling lands is a one-line flip.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-opt + binaryen
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_119/binaryen-version_119-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_119/bin" >> "$GITHUB_PATH"
      - name: Build + measure
        run: |
          cargo build -p hjkl-engine --release --no-default-features --target wasm32-unknown-unknown
          WASM=target/wasm32-unknown-unknown/release/hjkl_engine.wasm
          if [ -f "$WASM" ]; then
            wasm-opt -Oz "$WASM" -o /tmp/hjkl-engine.opt.wasm
            SIZE=$(gzip -c /tmp/hjkl-engine.opt.wasm | wc -c)
            echo "gzipped wasm size: $SIZE bytes"
            BUDGET=102400 # 100 KB
            if [ "$SIZE" -gt "$BUDGET" ]; then
              echo "::error::wasm size $SIZE exceeds budget $BUDGET"
              exit 1
            fi
          else
            echo "wasm not produced — skipping"
          fi

  vim_compat:
    name: vim-compat oracle (neovim)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install neovim
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends neovim
          nvim --version | head -1
      - name: Run compat oracle
        run: cargo test -p hjkl-compat-oracle --all-targets -- --nocapture
