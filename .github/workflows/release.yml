name: Release

on:
  push:
    tags:
      - "v*"
  # Manual re-runs for the publish step. The publish_if_new helper is
  # idempotent (skips crates already on crates.io at the matching
  # version), so re-dispatching after a partial failure is safe.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # mlugg/setup-zig still declares `using: node20` on its latest tag.
  # Opt JS actions into Node 24 now so the deprecation warning goes
  # quiet and we catch any upstream incompatibility early. Drop this
  # once setup-zig migrates to node24 (or June 2026, when GH flips
  # the default).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            glibc: "2.28"
            macos_min: ""
            suffix: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            glibc: ""
            macos_min: ""
            suffix: ".exe"
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            glibc: ""
            macos_min: "11.0"
            suffix: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            glibc: ""
            macos_min: "10.15"
            suffix: ""
            archive: tar.gz

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "v$CARGO_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace.package version v$CARGO_VER"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup zig
        if: matrix.glibc != ''
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.glibc != ''
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked --target ${{ matrix.target }} -- -D warnings

      - name: Build binary (zigbuild)
        if: matrix.glibc != ''
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}.${{ matrix.glibc }} --bin hjkl

      - name: Build binary
        if: matrix.glibc == ''
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_min }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin hjkl

      - name: Package (Linux / macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          TAG=${GITHUB_REF_NAME}
          ARCHIVE="hjkl-${TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hjkl${{ matrix.suffix }} dist/
          cp apps/hjkl/README.md dist/
          cp LICENSE dist/
          tar -czf "$ARCHIVE" -C dist .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME
          $ARCHIVE = "hjkl-$TAG-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force dist
          Copy-Item "target/${{ matrix.target }}/release/hjkl${{ matrix.suffix }}" dist/
          Copy-Item "apps/hjkl/README.md" dist/
          Copy-Item "LICENSE" dist/
          Compress-Archive -Path dist/* -DestinationPath $ARCHIVE
          $hash = (Get-FileHash -Algorithm SHA256 $ARCHIVE).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -Encoding ASCII "$ARCHIVE.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            hjkl-*.${{ matrix.archive }}
            hjkl-*.${{ matrix.archive }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Publish crates (dep order, idempotent)
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          publish_if_new() {
            local crate=$1
            local url="https://crates.io/api/v1/crates/${crate}/${VERSION}"
            if curl -fsS -A "hjkl-release-ci" -o /dev/null "$url"; then
              echo "::notice::${crate}@${VERSION} already on crates.io, skipping"
              return 0
            fi
            cargo publish -p "$crate" --locked
            sleep 30
          }
          # Topological dep order — see Cargo.toml of each crate.
          # hjkl-form  needs buffer + engine
          # hjkl-editor needs engine + buffer
          # hjkl-ratatui needs engine + form
          # hjkl-picker needs buffer + form
          # hjkl (app) needs all of them
          publish_if_new hjkl-buffer
          publish_if_new hjkl-tree-sitter
          publish_if_new hjkl-clipboard
          publish_if_new hjkl-engine
          publish_if_new hjkl-form
          publish_if_new hjkl-editor
          publish_if_new hjkl-ratatui
          publish_if_new hjkl-picker
          publish_if_new hjkl
