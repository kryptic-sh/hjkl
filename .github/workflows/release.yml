name: Release

on:
  push:
    tags:
      - "v*"
  # Manual re-runs for the publish step. The publish_if_new helper is
  # idempotent (skips crates already on crates.io at the matching
  # version), so re-dispatching after a partial failure is safe.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # mlugg/setup-zig still declares `using: node20` on its latest tag.
  # Opt JS actions into Node 24 now so the deprecation warning goes
  # quiet and we catch any upstream incompatibility early. Drop this
  # once setup-zig migrates to node24 (or June 2026, when GH flips
  # the default).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.28
            zig: "true"
            macos_min: ""
            suffix: ""
            archive: tar.gz
            deb: "true"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.28
            zig: "true"
            macos_min: ""
            suffix: ""
            archive: tar.gz
            deb: "true"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            zigbuild_target: x86_64-unknown-linux-musl
            zig: "true"
            macos_min: ""
            suffix: ""
            archive: tar.gz
            deb: "false"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            zigbuild_target: aarch64-unknown-linux-musl
            zig: "true"
            macos_min: ""
            suffix: ""
            archive: tar.gz
            deb: "false"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            zigbuild_target: ""
            zig: "false"
            macos_min: ""
            suffix: ".exe"
            archive: zip
            deb: "false"
          - os: macos-latest
            target: aarch64-apple-darwin
            zigbuild_target: ""
            zig: "false"
            macos_min: "11.0"
            suffix: ""
            archive: tar.gz
            deb: "false"
          - os: macos-latest
            target: x86_64-apple-darwin
            zigbuild_target: ""
            zig: "false"
            macos_min: "10.15"
            suffix: ""
            archive: tar.gz
            deb: "false"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "v$CARGO_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace.package version v$CARGO_VER"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup zig
        if: matrix.zig == 'true'
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.zig == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install cargo-deb
        if: matrix.deb == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      # fmt + clippy run in ci.yml on every PR/push; tagged releases
      # follow merged commits so re-running them here is redundant
      # (and clippy --target X needs cross C linkers we don't ship).

      - name: Build binary (zigbuild)
        if: matrix.zig == 'true'
        run: cargo zigbuild --release --locked --target ${{ matrix.zigbuild_target }} --bin hjkl

      - name: Build binary (native)
        if: matrix.zig == 'false'
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_min }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin hjkl

      - name: Package (Linux / macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          TAG=${GITHUB_REF_NAME}
          ARCHIVE="hjkl-${TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hjkl${{ matrix.suffix }} dist/
          cp apps/hjkl/README.md dist/
          cp LICENSE dist/
          tar -czf "$ARCHIVE" -C dist .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME
          $ARCHIVE = "hjkl-$TAG-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force dist
          Copy-Item "target/${{ matrix.target }}/release/hjkl${{ matrix.suffix }}" dist/
          Copy-Item "apps/hjkl/README.md" dist/
          Copy-Item "LICENSE" dist/
          Compress-Archive -Path dist/* -DestinationPath $ARCHIVE
          $hash = (Get-FileHash -Algorithm SHA256 $ARCHIVE).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -Encoding ASCII "$ARCHIVE.sha256"

      - name: Build .deb
        if: matrix.deb == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # cargo-deb resolves `target/release/...` asset paths to
          # `target/<target>/release/...` when --target is passed.
          # --no-build: reuse the zigbuild output above.
          # --no-strip: host strip can't process cross-compiled binaries.
          cargo deb -p hjkl --target ${{ matrix.target }} --no-build --no-strip
          DEB_FILE=$(ls target/${{ matrix.target }}/debian/hjkl_*.deb | head -1)
          cp "$DEB_FILE" .
          DEB_NAME=$(basename "$DEB_FILE")
          sha256sum "$DEB_NAME" > "$DEB_NAME.sha256"

      - name: Upload archives + sha256
        uses: softprops/action-gh-release@v3
        with:
          files: |
            hjkl-*.${{ matrix.archive }}
            hjkl-*.${{ matrix.archive }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .deb + sha256
        if: matrix.deb == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            hjkl_*.deb
            hjkl_*.deb.sha256
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew-bump:
    name: Bump homebrew tap
    needs: build
    runs-on: ubuntu-latest
    # Skip prerelease tags (e.g. v0.3.2-rc1) — only bump on stable releases.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: kryptic-sh/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render formula
        shell: bash
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME#v}
          BASE="https://github.com/kryptic-sh/hjkl/releases/download/${GITHUB_REF_NAME}"
          fetch_sha() {
            local tgt=$1
            local url="${BASE}/hjkl-${GITHUB_REF_NAME}-${tgt}.tar.gz"
            for i in 1 2 3 4 5; do
              if curl -fsSL -o "${tgt}.tar.gz" "$url"; then break; fi
              echo "::warning::fetch ${url} attempt ${i} failed, retrying"
              sleep 10
            done
            sha256sum "${tgt}.tar.gz" | cut -d' ' -f1
          }
          SHA_AARCH64_APPLE_DARWIN=$(fetch_sha aarch64-apple-darwin)
          SHA_X86_64_APPLE_DARWIN=$(fetch_sha x86_64-apple-darwin)
          SHA_X86_64_UNKNOWN_LINUX_GNU=$(fetch_sha x86_64-unknown-linux-gnu)
          SHA_AARCH64_UNKNOWN_LINUX_GNU=$(fetch_sha aarch64-unknown-linux-gnu)
          mkdir -p tap/Formula
          cat > tap/Formula/hjkl.rb <<EOF
          class Hjkl < Formula
            desc "Vim-modal terminal editor: standalone TUI built on the hjkl engine"
            homepage "https://hjkl.kryptic.sh"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/kryptic-sh/hjkl/releases/download/v#{version}/hjkl-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_APPLE_DARWIN}"
              else
                url "https://github.com/kryptic-sh/hjkl/releases/download/v#{version}/hjkl-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_APPLE_DARWIN}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/kryptic-sh/hjkl/releases/download/v#{version}/hjkl-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_UNKNOWN_LINUX_GNU}"
              end
              on_arm do
                url "https://github.com/kryptic-sh/hjkl/releases/download/v#{version}/hjkl-v#{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_UNKNOWN_LINUX_GNU}"
              end
            end

            def install
              bin.install "hjkl"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/hjkl --version")
            end
          end
          EOF

      - name: Commit + push formula
        shell: bash
        run: |
          set -euo pipefail
          cd tap
          git config user.name "kryptic-bot"
          git config user.email "bot@kryptic.sh"
          if git diff --quiet Formula/hjkl.rb; then
            echo "::notice::no changes to formula"
            exit 0
          fi
          git add Formula/hjkl.rb
          git commit -m "hjkl ${GITHUB_REF_NAME#v}"
          git push

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Publish crates (dep order, idempotent)
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          publish_if_new() {
            local crate=$1
            local url="https://crates.io/api/v1/crates/${crate}/${VERSION}"
            if curl -fsS -A "hjkl-release-ci" -o /dev/null "$url"; then
              echo "::notice::${crate}@${VERSION} already on crates.io, skipping"
              return 0
            fi
            cargo publish -p "$crate" --locked
            sleep 30
          }
          # Topological dep order — see Cargo.toml of each crate.
          # hjkl-form  needs buffer + engine
          # hjkl-editor needs engine + buffer
          # hjkl-ratatui needs engine + form
          # hjkl-picker needs buffer + form
          # hjkl (app) needs all of them
          publish_if_new hjkl-buffer
          publish_if_new hjkl-tree-sitter
          publish_if_new hjkl-clipboard
          publish_if_new hjkl-engine
          publish_if_new hjkl-form
          publish_if_new hjkl-editor
          publish_if_new hjkl-ratatui
          publish_if_new hjkl-picker
          publish_if_new hjkl
