[package]
name = "hjkl-vim-tui"
description = "Ratatui/crossterm driver for hjkl-vim — wires crossterm KeyEvents through the FSM."
keywords = ["vim", "modal", "editor", "tui", "crossterm"]
categories = ["text-editors", "command-line-interface"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
rust-version = "1.95"
readme = "README.md"

[dependencies]
hjkl-vim.workspace = true
hjkl-engine.workspace = true
hjkl-engine-tui.workspace = true
hjkl-buffer.workspace = true

[dev-dependencies]
proptest = "1"
crossterm = { version = "0.29.0", features = ["event-stream"] }
ratatui = { version = "0.30" }

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
