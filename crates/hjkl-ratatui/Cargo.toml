[package]
name = "hjkl-ratatui"
description = "Ratatui ↔ hjkl-engine adapters: Style conversions, KeyEvent bridging."
keywords = ["vim", "ratatui", "tui", "editor"]
categories = ["text-editors", "command-line-interface"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
homepage.workspace = true
readme = "README.md"

[features]
default = ["crossterm"]
crossterm = ["dep:crossterm"]

[dependencies]
# hjkl-ratatui is the canonical adapter crate — it lifts the engine's
# `ratatui` feature so consumers depending on hjkl-ratatui automatically
# get the ratatui-flavoured Editor surface. Engine `serde` and
# `crossterm` features stay opt-in via the engine dep directly when
# needed.
hjkl-engine = { path = "../hjkl-engine", version = "=0.0.30", default-features = false, features = [
  "ratatui",
] }
ratatui = "0.29"
crossterm = { version = "0.28.1", optional = true }

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
