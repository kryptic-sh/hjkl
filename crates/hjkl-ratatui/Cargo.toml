[package]
name = "hjkl-ratatui"
description = "Deprecated shim for hjkl-editor-tui. Use hjkl-editor-tui instead."
keywords = ["vim", "ratatui", "tui", "editor"]
categories = ["text-editors", "command-line-interface"]
version = "0.7.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-ratatui"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[features]
default = ["crossterm"]
crossterm = ["hjkl-editor-tui/crossterm"]

[dependencies]
hjkl-editor-tui = { version = "0.1", default-features = false }

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
