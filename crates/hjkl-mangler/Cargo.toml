[package]
name = "hjkl-mangler"
description = "External-formatter dispatch for hjkl: rustfmt, prettier, gofmt, ruff, stylua, shfmt, taplo and more"
keywords = ["formatter", "rustfmt", "prettier", "editor", "tui"]
categories = ["text-editors", "command-line-utilities"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
tracing = "0.1"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
