[package]
name = "hjkl-statusline"
description = "Renderer-agnostic statusline data model for hjkl editors. Segments + mode + filename + cursor; the ratatui adapter lives in hjkl-statusline-tui."
keywords = ["editor", "statusline", "vim", "tui", "gui"]
categories = ["text-editors"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
hjkl-theme.workspace = true
unicode-width.workspace = true

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
