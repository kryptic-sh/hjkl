"@keyword"          = { fg = "$mauve", modifiers = ["bold"] }
"@function"         = "$blue"
"@function.builtin" = { fg = "$blue", modifiers = ["italic"] }
"@string"           = "$green"
"@comment"          = { fg = "$overlay", modifiers = ["italic"] }
"@variable"         = "$fg"
"@number"           = { fg = "$mauve" }
"@type"             = { fg = "$mauve", modifiers = ["bold"] }

[palette]
bg     = "#1e1e2e"
fg     = "#cdd6f4"
blue   = "#89b4fa"
mauve  = "#cba6f7"
red    = "#f38ba8"
green  = "#a6e3a1"
yellow = "#f9e2af"
overlay = "#6c7086"
surface = "#313244"
mantle  = "#181825"

[ui]
background            = "$bg"
foreground            = "$fg"
cursor                = "$mauve"
cursorline            = "$surface"
statusline            = { fg = "$fg", bg = "$mantle" }
"statusline.inactive" = { fg = "$overlay", bg = "$mantle" }
gutter                = "$overlay"
"gutter.current"      = "$fg"
popup                 = { fg = "$fg", bg = "$mantle" }
selection             = { bg = "$surface" }
"diagnostic.error"    = "$red"
"diagnostic.warn"     = "$yellow"
