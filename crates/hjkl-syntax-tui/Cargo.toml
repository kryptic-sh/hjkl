[package]
name = "hjkl-syntax-tui"
description = "Ratatui adapter for hjkl-syntax: converts renderer-agnostic RenderOutput spans to ratatui Span/Line and routes DiagSigns to hjkl_buffer::Sign."
keywords = ["syntax", "tui", "ratatui", "highlight", "editor"]
categories = ["text-editors", "command-line-interface"]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
hjkl-syntax = "0.2"
hjkl-theme-tui = "0.1"
hjkl-buffer = { version = "0.7", features = ["ratatui"] }
ratatui = "0.30"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
