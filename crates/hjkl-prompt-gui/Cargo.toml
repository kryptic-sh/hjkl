[package]
name = "hjkl-prompt-gui"
description = "Floem adapter for hjkl-prompt: renders the ex/search prompt bar (`:`, `/`, `?`) as a floem view with a wildmenu completion strip."
keywords = ["prompt", "gui", "floem", "editor", "ex"]
categories = ["gui"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"
# Not published to crates.io — the floem GUI stack is workspace-only. Enforced
# here so an accidental `cargo publish` (or the release job) can't push it.
publish = false

[dependencies]
hjkl-prompt.workspace = true
floem = "0.2"
