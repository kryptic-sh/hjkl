[package]
name = "hjkl-menu-gui"
description = "Floem adapter for hjkl-menu: renders the renderer-agnostic context menu model into a floem view, mirroring the hjkl-menu-tui ratatui adapter."
keywords = ["editor", "menu", "context-menu", "floem", "gui"]
categories = ["gui"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"
# Not published to crates.io — the floem GUI stack is workspace-only. Enforced
# here so an accidental `cargo publish` (or the release job) can't push it.
publish = false

[dependencies]
hjkl-menu.workspace = true
floem = "0.2"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
