[package]
name = "hjkl-kitty"
description = "Kitty keyboard protocol support (DISAMBIGUATE_ESCAPE_CODES) for crossterm-based kryptic-sh TUIs"
keywords = ["kitty", "keyboard", "terminal", "crossterm", "tui"]
categories = ["text-editors", "command-line-utilities"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
crossterm = "0.29"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
