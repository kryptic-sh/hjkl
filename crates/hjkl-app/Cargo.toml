[package]
name = "hjkl-app"
description = "Host-agnostic application layer for the hjkl editor. Used by apps/hjkl (TUI) and apps/hjkl-gui (GUI)."
keywords = ["editor", "tui", "gui"]
categories = ["text-editors"]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
publish = false   # in-tree until Stage 4 promotes to a submodule

[dependencies]
anyhow = "1"
crossbeam-channel = "0.5"
ec4rs = "1"
git2 = { version = "0.20", default-features = false }
hjkl-anvil = "0.2"
hjkl-bonsai = "0.7"
hjkl-buffer = "0.7"
hjkl-config = "0.2"
hjkl-engine = { version = "0.9", default-features = false }
hjkl-keymap = "0.3"
hjkl-lsp = "0.1"
hjkl-picker = "0.7"
hjkl-vim = "0.20"
lsp-types = "0.97"
serde = { version = "1", features = ["derive"] }
toml = "1.1"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
