# hjkl default configuration. Bundled into the binary via include_str!()
# and parsed at runtime as the source of truth for default values.
#
# A user config at $XDG_CONFIG_HOME/hjkl/config.toml is layered on top
# of these defaults — only fields you want to override need to appear
# there. Unknown keys are an error.
#
# Resolved paths:
#   Linux   ~/.config/hjkl/config.toml
#   macOS   ~/Library/Application Support/sh.kryptic.hjkl/config.toml
#   Windows %APPDATA%\kryptic\hjkl\config\config.toml

[editor]
# Leader key in normal mode. Single character. Common alts: "\\", ",".
leader = " "

# Fallback indent width when no .editorconfig covers the open file.
tab_width = 4

# Fallback for spaces-vs-tabs when no .editorconfig covers the file.
expandtab = true

# Mouse support. When true, wheel scrolls the viewport (with scrolloff)
# and the terminal's native text-selection requires Shift to bypass
# capture (vim/nvim/helix convention). Toggle at runtime with
# `:set mouse` / `:set nomouse` / `:set mouse!` / `:set mouse?`.
mouse = true

# Milliseconds to wait for a chord to complete before timing out.
# Vim's `timeoutlen` equivalent. Must be > which_key.delay_ms or a
# startup warning is emitted (chord-resolve race may re-emerge).
chord_timeout_ms = 1000

# File-explorer icon set: "nerd" (Nerd-Font glyphs), "unicode" (geometric
# fallback ▸ ▾ ·), "ascii" (> v), or "auto". Terminals can't be queried for
# their font, so "auto" assumes a Nerd Font — set "unicode" or "ascii" if you
# don't have one (that's the reliable fallback).
icons = "auto"

# Cross-session cursor memory (like vim's `'"` mark / nvim shada). When true,
# reopening a file restores the last cursor position on that buffer — clamped
# to the current file, so it survives the file changing on disk (git pull, an
# edit in another editor). Set false to disable reading and writing the store.
restore_cursor = true

# Persistent undo (like vim's `undofile`). When true, `:w` writes the whole undo
# tree to disk and reopening the same, unchanged file restores the exact node it
# was saved on — so `u` and `<C-r>` keep working across sessions. Content-hash
# gated: if the file changed on disk (git pull, another editor) the stored tree
# is discarded. Set false to disable reading and writing undofiles.
undofile = true

# Optional override for where undofiles are stored. When unset, they live under
# `$XDG_STATE_HOME/hjkl/undo/` (e.g. ~/.local/state/hjkl/undo/). Uncomment to
# redirect, e.g. undodir = "/home/you/.hjkl-undo".
# undodir = ""

[theme]
# Theme name. Currently only "dark" is bundled.
name = "dark"

[explorer]
# Width (columns) of the left file-explorer dock. Interactively resizable
# with `<C-w> <` / `<C-w> >` (or by dragging its right border with the
# mouse) while the explorer is focused — resizing writes this value back to
# your config file so it persists across sessions.
width = 36

# Whether the left file-explorer dock is open. Toggling it (`<leader>e` or
# `<C-w>c` on the dock) writes this value back to your config file, so hjkl
# reopens the explorer on the next launch iff you left it open. Does not
# affect the bottom quickfix/location-list dock, which is never restored —
# see `[panel]` below for why.
open = false

[panel]
# Height (rows) of the bottom panel dock (quickfix / location-list).
# Interactively resizable the same way `[explorer].width` is.
height = 12

# There is deliberately no `open`/`which` key here to mirror
# `[explorer].open`: the quickfix/location-list ENTRIES are never persisted
# to disk (they're rebuilt fresh by `:grep`/`:make`/etc. every run), so
# restoring an empty dock on startup would just show a blank read-only
# buffer with nothing in it — not worth the config surface.

[which_key]
# Show a popup listing available bindings when a prefix key is held
# without follow-up for delay_ms milliseconds.
enabled = true
delay_ms = 500

[lsp]
# LSP subsystem. Enabled by default — set `enabled = false` in your user config
# (~/.config/hjkl/config.toml) to turn it off. The `[lsp.servers.<lang>]` blocks
# below ship as sensible defaults — a server only spawns when you open a file
# matching its language AND the binary resolves on $PATH; missing binaries fail
# silently, so installs without language servers pay no real cost.
enabled = true

[lsp.servers.rust]
command = "rust-analyzer"
root_markers = ["Cargo.toml", ".git"]

[lsp.servers.typescript]
command = "typescript-language-server"
args = ["--stdio"]
root_markers = ["package.json", "tsconfig.json", ".git"]

[lsp.servers.javascript]
command = "typescript-language-server"
args = ["--stdio"]
root_markers = ["package.json", "jsconfig.json", ".git"]

[lsp.servers.python]
command = "pyright-langserver"
args = ["--stdio"]
root_markers = ["pyproject.toml", "setup.py", "setup.cfg", "Pipfile", ".git"]

[lsp.servers.go]
command = "gopls"
root_markers = ["go.mod", ".git"]

[lsp.servers.c]
command = "clangd"
root_markers = ["compile_commands.json", ".clangd", ".git"]

[lsp.servers.cpp]
command = "clangd"
root_markers = ["compile_commands.json", ".clangd", ".git"]

[lsp.servers.lua]
command = "lua-language-server"
root_markers = [".luarc.json", ".luarc.jsonc", ".git"]

[lsp.servers.toml]
command = "taplo"
args = ["lsp", "stdio"]
root_markers = [".taplo.toml", "taplo.toml", ".git"]

[lsp.servers.json]
command = "vscode-json-language-server"
args = ["--stdio"]
root_markers = [".git"]

[lsp.servers.markdown]
command = "marksman"
args = ["server"]
root_markers = [".marksman.toml", ".git"]
