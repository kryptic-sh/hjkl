[package]
name = "hjkl-lang"
description = "Language directory and grammar request types for the hjkl editor stack: GrammarRequest, LanguageDirectory."
keywords = ["language", "grammar", "tree-sitter", "editor"]
categories = ["text-editors", "parsing"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
anyhow = "1"
hjkl-bonsai.workspace = true
tracing = "0.1"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
