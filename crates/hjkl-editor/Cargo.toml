[package]
name = "hjkl-editor"
description = "Front-door for the hjkl modal editor stack: vim engine + rope buffer + registers, in one crate."
keywords = ["vim", "editor", "modal"]
categories = ["text-editors"]
version = "0.8.1"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-editor"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[features]
default = ["serde"]
serde = ["hjkl-engine/serde"]
crossterm = ["hjkl-engine/crossterm"]
# Pulls the engine's `ratatui` adapter surface (Style intern, mouse
# Rect helpers) plus the buffer's ratatui Widget impl. Default-on for
# back-compat; non-terminal hosts opt out via `default-features = false`.
ratatui = ["hjkl-engine/ratatui", "hjkl-buffer/ratatui"]

[dependencies]
hjkl-engine = { version = "0.11", default-features = false }
hjkl-buffer = "0.8"

[dev-dependencies]
crossterm = { version = "0.29.0", features = ["event-stream"] }

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
