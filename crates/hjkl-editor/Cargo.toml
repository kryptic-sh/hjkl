[package]
name = "hjkl-editor"
description = "Front-door for the hjkl modal editor stack: vim engine + rope buffer + registers + ex commands, in one crate."
keywords = ["vim", "editor", "modal", "ex"]
categories = ["text-editors"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
homepage.workspace = true
readme = "README.md"

[features]
default = ["serde", "crossterm", "ratatui"]
serde = ["hjkl-engine/serde"]
crossterm = ["hjkl-engine/crossterm"]
# Pulls the engine's `ratatui` adapter surface (Style intern, mouse
# Rect helpers) plus the buffer's ratatui Widget impl. Default-on for
# back-compat; non-terminal hosts opt out via `default-features = false`.
ratatui = ["hjkl-engine/ratatui", "hjkl-buffer/ratatui"]

[dependencies]
hjkl-engine = { path = "../hjkl-engine", version = "=0.0.27", default-features = false }
hjkl-buffer = { path = "../hjkl-buffer", version = "=0.0.27" }
regex = "1"

[dev-dependencies]
crossterm = { version = "0.28.1", features = ["event-stream"] }
insta = "1"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
