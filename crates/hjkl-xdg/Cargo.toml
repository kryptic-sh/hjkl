[package]
name = "hjkl-xdg"
description = "XDG Base Directory resolution — env-first, $HOME-fallback, uniform across platforms"
keywords = ["xdg", "config", "paths"]
categories = ["filesystem", "os"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-xdg"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
dirs = "6"
thiserror = "2"

[dev-dependencies]
tempfile = "3"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
