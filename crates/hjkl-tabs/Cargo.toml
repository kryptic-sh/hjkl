[package]
name = "hjkl-tabs"
description = "Renderer-agnostic tab bar data model for hjkl editors. TabBar<Id> + Tab<Id> with open/close/focus/cycle/overflow; ratatui adapter lives in hjkl-tabs-tui."
keywords = ["editor", "tabs", "tabbar", "vim", "tui"]
categories = ["text-editors"]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
