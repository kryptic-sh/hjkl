[package]
name = "hjkl-splash"
description = "Rendering-agnostic splash-screen animation for kryptic-sh projects."
keywords = ["tui", "animation", "splash"]
categories = ["text-editors", "command-line-utilities"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
homepage = "https://hjkl.kryptic.sh"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
