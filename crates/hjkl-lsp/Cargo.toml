[package]
name = "hjkl-lsp"
description = "LSP client for the hjkl modal editor."
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-lsp"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros", "io-util", "process", "sync", "time"] }
crossbeam-channel = "0.5"
tracing = "0.1"
url = "2"

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "io-util", "sync", "time", "test-util"] }
tempfile = "3"
