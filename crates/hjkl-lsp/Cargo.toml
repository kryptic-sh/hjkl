[package]
name = "hjkl-lsp"
description = "LSP client for the hjkl modal editor."
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
lsp-types = "0.97"
tokio = { version = "1", features = ["rt", "macros", "io-util", "process", "sync", "time"] }
crossbeam-channel = "0.5"
tracing = "0.1"
url = "2"

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "io-util", "sync", "time", "test-util"] }
tempfile = "3"
