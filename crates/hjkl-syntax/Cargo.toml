[package]
name = "hjkl-syntax"
description = "Renderer-agnostic syntax-highlighting pipeline for the hjkl editor stack: SyntaxWorker background thread, RenderCache, viewport-scoped highlight passes."
keywords = ["syntax", "tree-sitter", "editor", "highlight"]
categories = ["text-editors", "parsing"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
hjkl-bonsai.workspace = true
hjkl-buffer.workspace = true
hjkl-theme.workspace = true
hjkl-engine.workspace = true
hjkl-lang.workspace = true
tracing = "0.1"
memchr = "2"
ropey = "1.6"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
