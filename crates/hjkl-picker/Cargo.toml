[package]
name = "hjkl-picker"
description = "Fuzzy picker subsystem for hjkl-based apps — file, grep, and custom sources."
keywords = ["picker", "fuzzy", "tui", "vim", "modal"]
categories = ["command-line-interface", "gui"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-picker"
homepage = "https://hjkl.kryptic.sh"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
readme = "README.md"

[dependencies]
hjkl-buffer.workspace = true
hjkl-engine.workspace = true
hjkl-form.workspace = true
hjkl-fuzzy.workspace = true
regex       = "1"
ignore      = "0.4"

[dev-dependencies]
tempfile = "3"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
