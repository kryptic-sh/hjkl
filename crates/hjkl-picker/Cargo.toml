[package]
name = "hjkl-picker"
description = "Fuzzy picker subsystem for hjkl-based apps — file, grep, and custom sources."
keywords = ["picker", "fuzzy", "tui", "vim", "modal"]
categories = ["command-line-interface", "gui"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
rust-version.workspace = true
readme = "README.md"

[dependencies]
hjkl-buffer = { path = "../hjkl-buffer", version = "=0.2.0" }
hjkl-engine = { path = "../hjkl-engine", version = "=0.2.0", default-features = false, features = ["crossterm"] }
hjkl-form   = { path = "../hjkl-form",   version = "=0.2.0" }
ratatui     = "0.29"
crossterm   = "0.28"
regex       = "1"
ignore      = "0.4"

[dev-dependencies]
tempfile = "3"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
