[package]
name = "hjkl-markdown"
description = "Renderer-agnostic markdown event stream and theming hooks for the hjkl editor stack."
keywords = ["markdown", "editor", "parser", "theme"]
categories = ["text-editors", "parsing"]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
pulldown-cmark = { version = "0.13", default-features = false }

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
