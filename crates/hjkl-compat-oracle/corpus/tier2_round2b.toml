# Round 2b hardening pass — pinning cases for verified vim-compat bugs.
#
# Live nvim compare (each case's expected_buffer/expected_cursor is also
# sanity-checked against a live nvim by the oracle harness itself).

# ─── B11 — `x` at EOL leaves cursor past end ──────────────────────────────────

# `$x` on "foobar": deletes the last char, cursor clamps to the new last
# column (not one past it).
[[cases]]
name = "b11_x_at_eol_clamps_cursor"
initial_buffer = "foobar\n"
initial_cursor = [0, 0]
keys = "$x"
expected_buffer = "fooba\n"
expected_cursor = [0, 4]

# `x` on a single-char line deletes it and clamps to col 0.
[[cases]]
name = "b11_x_single_char_line_clamps_to_zero"
initial_buffer = "a\n"
initial_cursor = [0, 0]
keys = "x"
expected_buffer = "\n"
expected_cursor = [0, 0]

# Counted `3x` hitting EOL deletes through the end and clamps.
[[cases]]
name = "b11_counted_x_hits_eol_clamps"
initial_buffer = "abcde\n"
initial_cursor = [0, 3]
keys = "3x"
expected_buffer = "abc\n"
expected_cursor = [0, 2]

# ─── B21 — counted `~` runs past EOL ──────────────────────────────────────────

# `5~` at col 1 of "abc" only has 2 chars left to toggle; cursor clamps to
# the last column instead of running past it.
[[cases]]
name = "b21_counted_tilde_clamps_cursor"
initial_buffer = "abc\n"
initial_cursor = [0, 1]
keys = "5~"
expected_buffer = "aBC\n"
expected_cursor = [0, 2]

# ─── B20 — counted `P` cursor position ────────────────────────────────────────

# `yl3P` on "abc": yanks 'a' (1 char), pastes it 3 times before the cursor as
# one block ("aaa" + "abc"). Cursor lands on the LAST char of the pasted
# block, not on the first char pasted by the final loop iteration.
[[cases]]
name = "b20_counted_capital_p_charwise_cursor"
initial_buffer = "abc\n"
initial_cursor = [0, 0]
keys = "yl3P"
expected_buffer = "aaaabc\n"
expected_cursor = [0, 2]

# `yl1P` (no count) still lands on the single pasted char.
[[cases]]
name = "b20_uncounted_capital_p_charwise_cursor"
initial_buffer = "abc\n"
initial_cursor = [0, 0]
keys = "yl1P"
expected_buffer = "aabc\n"
expected_cursor = [0, 0]

# Multi-char register + count: `yw3P` yanks "abc " (word + trailing space)
# and pastes it 3 times before the cursor.
[[cases]]
name = "b20_counted_capital_p_multichar_register"
initial_buffer = "abc def\n"
initial_cursor = [0, 0]
keys = "yw3P"
expected_buffer = "abc abc abc abc def\n"
expected_cursor = [0, 11]

# ─── B19 — `*` / `#` from punctuation ─────────────────────────────────────────

# Cursor on the first `.` in "a.b a.b": `*` advances to the next keyword
# char ("b" at index 2) first, then searches forward for that word —
# landing on the SECOND "b" (index 6), not deleting the "a" before the dot.
[[cases]]
name = "b19_star_from_punctuation"
initial_buffer = "a.b a.b\n"
initial_cursor = [0, 1]
keys = "*x"
expected_buffer = "a.b a.\n"
expected_mode = "normal"

# Cursor on a space between words: `*` still advances forward to the next
# keyword char rather than expanding the (non-existent) word at the cursor.
[[cases]]
name = "b19_star_from_whitespace"
initial_buffer = "a b a b\n"
initial_cursor = [0, 1]
keys = "*x"
expected_buffer = "a b a \n"
expected_mode = "normal"

# `#` mirrors `*`: it ALSO advances forward to find the word (per `:h
# star`), then searches BACKWARD for the previous occurrence. Cursor on the
# second `.` in "a.b a.b": forward-scan finds "b" at index 6, backward
# search from there lands on the FIRST "b" (index 2).
[[cases]]
name = "b19_hash_from_punctuation"
initial_buffer = "a.b a.b\n"
initial_cursor = [0, 5]
keys = "#x"
expected_buffer = "a. a.b\n"
expected_mode = "normal"

# ─── B1 — insert-mode C-a/C-e/C-y ─────────────────────────────────────────────

# `<C-a>` re-inserts the text typed during the previous insert session.
[[cases]]
name = "b1_ctrl_a_reinserts_last_insert"
initial_buffer = "\n"
initial_cursor = [0, 0]
keys = "ifoo<Esc>a<C-a><Esc>"
expected_buffer = "foofoo\n"
expected_cursor = [0, 5]
expected_mode = "normal"

# `<C-e>` copies the char in the same column of the line BELOW.
[[cases]]
name = "b1_ctrl_e_copies_char_below"
initial_buffer = "abc\ndef\nghi\n"
initial_cursor = [0, 0]
keys = "jli<C-e><Esc>"
expected_buffer = "abc\ndhef\nghi\n"
expected_cursor = [1, 1]
expected_mode = "normal"

# `<C-y>` copies the char in the same column of the line ABOVE.
[[cases]]
name = "b1_ctrl_y_copies_char_above"
initial_buffer = "abc\ndef\nghi\n"
initial_cursor = [0, 0]
keys = "jli<C-y><Esc>"
expected_buffer = "abc\ndbef\nghi\n"
expected_cursor = [1, 1]
expected_mode = "normal"

# `<C-y>` at row 0 (no line above) is a no-op.
[[cases]]
name = "b1_ctrl_y_noop_at_first_row"
initial_buffer = "abc\ndef\nghi\n"
initial_cursor = [0, 0]
keys = "li<C-y><Esc>"
expected_buffer = "abc\ndef\nghi\n"
expected_cursor = [0, 0]
expected_mode = "normal"
