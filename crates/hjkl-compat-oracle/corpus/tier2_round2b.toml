# Round 2b hardening pass — pinning cases for verified vim-compat bugs.
#
# Live nvim compare (each case's expected_buffer/expected_cursor is also
# sanity-checked against a live nvim by the oracle harness itself).

# ─── B11 — `x` at EOL leaves cursor past end ──────────────────────────────────

# `$x` on "foobar": deletes the last char, cursor clamps to the new last
# column (not one past it).
[[cases]]
name = "b11_x_at_eol_clamps_cursor"
initial_buffer = "foobar\n"
initial_cursor = [0, 0]
keys = "$x"
expected_buffer = "fooba\n"
expected_cursor = [0, 4]

# `x` on a single-char line deletes it and clamps to col 0.
[[cases]]
name = "b11_x_single_char_line_clamps_to_zero"
initial_buffer = "a\n"
initial_cursor = [0, 0]
keys = "x"
expected_buffer = "\n"
expected_cursor = [0, 0]

# Counted `3x` hitting EOL deletes through the end and clamps.
[[cases]]
name = "b11_counted_x_hits_eol_clamps"
initial_buffer = "abcde\n"
initial_cursor = [0, 3]
keys = "3x"
expected_buffer = "abc\n"
expected_cursor = [0, 2]

# ─── B21 — counted `~` runs past EOL ──────────────────────────────────────────

# `5~` at col 1 of "abc" only has 2 chars left to toggle; cursor clamps to
# the last column instead of running past it.
[[cases]]
name = "b21_counted_tilde_clamps_cursor"
initial_buffer = "abc\n"
initial_cursor = [0, 1]
keys = "5~"
expected_buffer = "aBC\n"
expected_cursor = [0, 2]

# ─── B20 — counted `P` cursor position ────────────────────────────────────────

# `yl3P` on "abc": yanks 'a' (1 char), pastes it 3 times before the cursor as
# one block ("aaa" + "abc"). Cursor lands on the LAST char of the pasted
# block, not on the first char pasted by the final loop iteration.
[[cases]]
name = "b20_counted_capital_p_charwise_cursor"
initial_buffer = "abc\n"
initial_cursor = [0, 0]
keys = "yl3P"
expected_buffer = "aaaabc\n"
expected_cursor = [0, 2]

# `yl1P` (no count) still lands on the single pasted char.
[[cases]]
name = "b20_uncounted_capital_p_charwise_cursor"
initial_buffer = "abc\n"
initial_cursor = [0, 0]
keys = "yl1P"
expected_buffer = "aabc\n"
expected_cursor = [0, 0]

# Multi-char register + count: `yw3P` yanks "abc " (word + trailing space)
# and pastes it 3 times before the cursor.
[[cases]]
name = "b20_counted_capital_p_multichar_register"
initial_buffer = "abc def\n"
initial_cursor = [0, 0]
keys = "yw3P"
expected_buffer = "abc abc abc abc def\n"
expected_cursor = [0, 11]

# ─── B19 — `*` / `#` from punctuation ─────────────────────────────────────────

# Cursor on the first `.` in "a.b a.b": `*` advances to the next keyword
# char ("b" at index 2) first, then searches forward for that word —
# landing on the SECOND "b" (index 6), not deleting the "a" before the dot.
[[cases]]
name = "b19_star_from_punctuation"
initial_buffer = "a.b a.b\n"
initial_cursor = [0, 1]
keys = "*x"
expected_buffer = "a.b a.\n"
expected_mode = "normal"

# Cursor on a space between words: `*` still advances forward to the next
# keyword char rather than expanding the (non-existent) word at the cursor.
[[cases]]
name = "b19_star_from_whitespace"
initial_buffer = "a b a b\n"
initial_cursor = [0, 1]
keys = "*x"
expected_buffer = "a b a \n"
expected_mode = "normal"

# `#` mirrors `*`: it ALSO advances forward to find the word (per `:h
# star`), then searches BACKWARD for the previous occurrence. Cursor on the
# second `.` in "a.b a.b": forward-scan finds "b" at index 6, backward
# search from there lands on the FIRST "b" (index 2).
[[cases]]
name = "b19_hash_from_punctuation"
initial_buffer = "a.b a.b\n"
initial_cursor = [0, 5]
keys = "#x"
expected_buffer = "a. a.b\n"
expected_mode = "normal"

# ─── B1 — insert-mode C-a/C-e/C-y ─────────────────────────────────────────────

# `<C-a>` re-inserts the text typed during the previous insert session.
[[cases]]
name = "b1_ctrl_a_reinserts_last_insert"
initial_buffer = "\n"
initial_cursor = [0, 0]
keys = "ifoo<Esc>a<C-a><Esc>"
expected_buffer = "foofoo\n"
expected_cursor = [0, 5]
expected_mode = "normal"

# `<C-e>` copies the char in the same column of the line BELOW.
[[cases]]
name = "b1_ctrl_e_copies_char_below"
initial_buffer = "abc\ndef\nghi\n"
initial_cursor = [0, 0]
keys = "jli<C-e><Esc>"
expected_buffer = "abc\ndhef\nghi\n"
expected_cursor = [1, 1]
expected_mode = "normal"

# `<C-y>` copies the char in the same column of the line ABOVE.
[[cases]]
name = "b1_ctrl_y_copies_char_above"
initial_buffer = "abc\ndef\nghi\n"
initial_cursor = [0, 0]
keys = "jli<C-y><Esc>"
expected_buffer = "abc\ndbef\nghi\n"
expected_cursor = [1, 1]
expected_mode = "normal"

# `<C-y>` at row 0 (no line above) is a no-op.
[[cases]]
name = "b1_ctrl_y_noop_at_first_row"
initial_buffer = "abc\ndef\nghi\n"
initial_cursor = [0, 0]
keys = "li<C-y><Esc>"
expected_buffer = "abc\ndef\nghi\n"
expected_cursor = [0, 0]
expected_mode = "normal"

# ─── B2 — insert C-w at BOL joins lines instead of eating the previous word ───

# `A<CR><C-w><Esc>` on "abc": opens a new line, then immediately joins it
# back — must restore "abc" exactly, not eat the word before the cursor.
[[cases]]
name = "b2_ctrl_w_at_bol_joins_not_eats_word"
initial_buffer = "abc\n"
initial_cursor = [0, 0]
keys = "A<CR><C-w><Esc>"
expected_buffer = "abc\n"
expected_cursor = [0, 2]
expected_mode = "normal"

# BOL `Ctrl-W` with real text AFTER the cursor on the current line — the
# join must preserve that trailing text (a bare join with no space, unlike
# `J`), verified against nvim.
[[cases]]
name = "b2_ctrl_w_at_bol_preserves_trailing_text"
initial_buffer = "\n"
initial_cursor = [0, 0]
keys = "iab cd<CR>ef<Home><C-w><Esc>"
expected_buffer = "ab cdef\n"
expected_mode = "normal"

# BOL `Ctrl-W` on a pre-existing multi-line buffer (not a freshly opened
# line) — same bare-join behaviour.
[[cases]]
name = "b2_ctrl_w_at_bol_existing_buffer"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "jI<C-w><Esc>"
expected_buffer = "foobar\n"
expected_cursor = [0, 2]
expected_mode = "normal"

# ─── B3 — insert C-u deletes only the session's typed text ───────────────────

# `Aworld<C-u><Esc>` on "hello ": deletes only "world" (this session's
# typed text), not the whole line.
[[cases]]
name = "b3_ctrl_u_deletes_only_session_text"
initial_buffer = "hello \n"
initial_cursor = [0, 0]
keys = "Aworld<C-u><Esc>"
expected_buffer = "hello \n"
expected_cursor = [0, 5]
expected_mode = "normal"

# Nothing typed yet this session, no indent: falls back to deleting to
# column 0.
[[cases]]
name = "b3_ctrl_u_no_session_text_no_indent"
initial_buffer = "hello\n"
initial_cursor = [0, 0]
keys = "lli<C-u>x<Esc>"
expected_buffer = "xllo\n"
expected_cursor = [0, 0]
expected_mode = "normal"

# Nothing typed yet this session, WITH indent: first C-u falls back to the
# first non-blank column (keeps the indent).
[[cases]]
name = "b3_ctrl_u_no_session_text_with_indent"
initial_buffer = "    hello\n"
initial_cursor = [0, 0]
keys = "A<C-u>x<Esc>"
expected_buffer = "    x\n"
expected_mode = "normal"

# Two consecutive C-u presses with nothing session-typed: the first
# deletes to the indent boundary, the second (cursor now AT that boundary)
# deletes the indent too, reaching column 0.
[[cases]]
name = "b3_ctrl_u_twice_reaches_col_zero"
initial_buffer = "    hello\n"
initial_cursor = [0, 0]
keys = "A<C-u><C-u>x<Esc>"
expected_buffer = "x\n"
expected_cursor = [0, 0]
expected_mode = "normal"

# Typed text, C-u, then MORE typed text, then C-u again: the session start
# column is the ORIGINAL insert-entry column, not reset by the first C-u.
[[cases]]
name = "b3_ctrl_u_session_start_survives_first_press"
initial_buffer = "hi\n"
initial_cursor = [0, 0]
keys = "Afoo<C-u>bar<C-u>x<Esc>"
expected_buffer = "hix\n"
expected_cursor = [0, 2]
expected_mode = "normal"

# Insert session spans a newline (`o`/`<CR>` mid-session): C-u on the NEW
# row is scoped to that row, not the original entry row.
[[cases]]
name = "b3_ctrl_u_session_spans_newline"
initial_buffer = "abc\n"
initial_cursor = [0, 0]
keys = "A<CR>newtext<C-u>x<Esc>"
expected_buffer = "abc\nx\n"
expected_mode = "normal"

# ─── B16 — ip/ap text objects on blank-line runs ──────────────────────────────

# `dip` from a blank line in the middle of a 3-line blank run deletes the
# WHOLE run, not a no-op.
[[cases]]
name = "b16_dip_from_middle_of_blank_run"
initial_buffer = "a\n\n\n\nb\n"
initial_cursor = [0, 0]
keys = "jdip"
expected_buffer = "a\nb\n"
expected_mode = "normal"

# `dap` from a blank run additionally consumes the following non-blank
# paragraph (but not further — "c" sits behind its own blank separator).
# Deliberately leaves trailing content after the deleted range so this case
# doesn't also exercise the unrelated pre-existing "linewise delete through
# the buffer's true end mislands the cursor on the phantom row" gap (see
# the note near the bottom of this file).
[[cases]]
name = "b16_dap_from_blank_run_consumes_next_paragraph"
initial_buffer = "a\n\n\n\nb\n\nc\n"
initial_cursor = [0, 0]
keys = "jdap"
expected_buffer = "a\n\nc\n"
expected_mode = "normal"

# `dip` on a blank run at the very START of the buffer (no leading
# paragraph) still deletes the whole run.
[[cases]]
name = "b16_dip_from_blank_run_at_buffer_start"
initial_buffer = "\n\n\nb\n"
initial_cursor = [0, 0]
keys = "dip"
expected_buffer = "b\n"
expected_mode = "normal"

# `dap` on a blank run at the buffer start consumes the run AND the
# following paragraph, emptying the buffer entirely — verified against real
# nvim (`wordcount().bytes == 0`, the same genuinely-emptied state `dG` from
# row 0 produces, not a single leftover "\n"). Previously deferred to a unit
# test on the (mistaken) assumption that `hjkl_driver.rs`'s buffer
# reconstruction fabricated the wrong value here; empirical re-verification
# against live nvim (#281) showed the driver already agreed with nvim on
# this one.
[[cases]]
name = "b16_dap_from_blank_run_at_buffer_start_empties_buffer"
initial_buffer = "\n\n\nb\n"
initial_cursor = [0, 0]
keys = "dap"
expected_buffer = ""
expected_mode = "normal"

# `dip` on a blank run touching EOF (no trailing paragraph) deletes just the
# run, leaving the preceding paragraph intact WITH its trailing newline —
# verified against real nvim. This one *did* diverge (#281): `paragraph_text_object`
# extended the blank run into ropey's phantom trailing empty row (the
# synthetic line a rope ending in `\n` always reports past its real content),
# so the linewise delete's "reached the last row" branch also ate the `\n`
# terminating the preceding real line. Fixed by clamping the blank-run scan
# to the buffer's real last content row, mirroring the same clamp this file's
# `sentence_boundary` already applies (`hjkl-vim/src/vim/text_object.rs`).
[[cases]]
name = "b16_dip_from_blank_run_at_eof_leaves_preceding_paragraph"
initial_buffer = "a\n\n\n\n"
initial_cursor = [0, 0]
keys = "jdip"
expected_buffer = "a\n"
expected_mode = "normal"

# ─── B13 — {count}zt/zz/zb honor count (cursor part; scroll isn't oracle-able) ─

# `5zt` moves the cursor to line 5, PRESERVING the current column
# (clamped, not resetting to first non-blank) — verified against nvim.
[[cases]]
name = "b13_counted_zt_moves_cursor_preserves_column"
initial_buffer = "line1\nline2\nline3\nline4\nline5\nline6\nline7\nline8\nline9\nline10\n"
initial_cursor = [0, 3]
keys = "5zt"
expected_buffer = "line1\nline2\nline3\nline4\nline5\nline6\nline7\nline8\nline9\nline10\n"
expected_cursor = [4, 3]
expected_mode = "normal"

# `5zt` clamps the preserved column to the target line's length when it's
# shorter than the current column.
[[cases]]
name = "b13_counted_zt_clamps_column_to_line_length"
initial_buffer = "aaaaaaaaaa\nbb\nccc\ndddd\ne\nffffff\n"
initial_cursor = [0, 7]
keys = "5zt"
expected_buffer = "aaaaaaaaaa\nbb\nccc\ndddd\ne\nffffff\n"
expected_cursor = [4, 0]
expected_mode = "normal"

# Bare `zt` (no count) does NOT move the cursor at all — only `[count]zt`
# does.
[[cases]]
name = "b13_bare_zt_does_not_move_cursor"
initial_buffer = "line1\nline2\nline3\nline4\nline5\nline6\nline7\nline8\nline9\nline10\n"
initial_cursor = [2, 2]
keys = "zt"
expected_buffer = "line1\nline2\nline3\nline4\nline5\nline6\nline7\nline8\nline9\nline10\n"
expected_cursor = [2, 2]
expected_mode = "normal"

# `dap` on a blank run touching EOF (no paragraph AFTER it to consume) is a
# no-op — verified against nvim: the buffer is left completely unchanged.
[[cases]]
name = "b16_dap_from_blank_run_at_eof_is_noop"
initial_buffer = "a\n\n\n\n"
initial_cursor = [0, 0]
keys = "jdap"
expected_buffer = "a\n\n\n\n"
expected_mode = "normal"
