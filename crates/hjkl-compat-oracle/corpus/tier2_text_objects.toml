# Tier 2 text-objects corpus — 8 cases covering paragraph, sentence, single-quote,
# and square-bracket text objects that are absent from Tier 1.
#
# All buffers are ASCII-only.
# Cursor positions: 0-based (row, col).

# ─── Paragraph text objects ──────────────────────────────────────────────────

# `dap` deletes around paragraph (includes surrounding blank line).
# Buffer: "alpha beta\n\ngamma\n" — cursor on line 0.
# Around-paragraph eats the content + the separating blank line.
[[cases]]
name = "textobj_dap_delete_around_paragraph"
initial_buffer = "alpha beta\n\ngamma\n"
initial_cursor = [0, 0]
keys = "dap"
expected_buffer = "gamma\n"
expected_cursor = [0, 0]

# `dip` deletes inside paragraph (only the content, not the blank line).
[[cases]]
name = "textobj_dip_delete_inside_paragraph"
initial_buffer = "alpha beta\n\ngamma\n"
initial_cursor = [0, 0]
keys = "dip"
expected_buffer = "\ngamma\n"
expected_cursor = [0, 0]

# ─── Sentence text objects ────────────────────────────────────────────────────

# `das` deletes around sentence (sentence + trailing whitespace).
# "First. Second. Third.\n" — cursor on "Second"; das removes "Second. " (with space).
[[cases]]
name = "textobj_das_delete_around_sentence"
initial_buffer = "First. Second. Third.\n"
initial_cursor = [0, 7]
keys = "das"
expected_buffer = "First. Third.\n"
expected_cursor = [0, 7]

# `dis` deletes inside sentence (sentence only, no trailing space).
[[cases]]
name = "textobj_dis_delete_inside_sentence"
initial_buffer = "First. Second. Third.\n"
initial_cursor = [0, 7]
keys = "dis"
expected_buffer = "First.  Third.\n"
expected_cursor = [0, 7]

# ─── Single-quote text objects ────────────────────────────────────────────────

# `da'` deletes around single-quoted string (including the quotes).
[[cases]]
name = "textobj_da_singlequote"
initial_buffer = "foo 'bar baz' qux\n"
initial_cursor = [0, 6]
keys = "da'"
expected_buffer = "foo qux\n"
expected_cursor = [0, 4]

# `di'` deletes inside single-quoted string (leaves quotes in place).
[[cases]]
name = "textobj_di_singlequote"
initial_buffer = "foo 'bar baz' qux\n"
initial_cursor = [0, 6]
keys = "di'"
expected_buffer = "foo '' qux\n"
expected_cursor = [0, 5]

# ─── Square-bracket text objects ─────────────────────────────────────────────

# `da[` deletes around square brackets (including the brackets).
[[cases]]
name = "textobj_da_squarebracket"
initial_buffer = "x [a b] y\n"
initial_cursor = [0, 4]
keys = "da["
expected_buffer = "x  y\n"
expected_cursor = [0, 2]

# `di[` deletes inside square brackets (leaves brackets in place).
[[cases]]
name = "textobj_di_squarebracket"
initial_buffer = "x [a b] y\n"
initial_cursor = [0, 4]
keys = "di["
expected_buffer = "x [] y\n"
expected_cursor = [0, 3]

# ─── Curly-brace inner text objects (`di{`) ──────────────────────────────────
# All expected values verified against headless nvim 0.12.

# Single-line `di{`: delete inside the braces, leave them in place.
[[cases]]
name = "textobj_di_curlybrace_single_line"
initial_buffer = "x {a b} y\n"
initial_cursor = [0, 4]
keys = "di{"
expected_buffer = "x {} y\n"
expected_cursor = [0, 3]

# Multi-line `di{` with braces on their own lines is LINEWISE in vim: the
# whole body line(s) are removed, leaving the brace lines touching.
# Cursor lands at col 0 of the closing-brace line.
[[cases]]
name = "textobj_di_curlybrace_multiline_body"
initial_buffer = "fn x() {\n    body\n}\n"
initial_cursor = [1, 4]
keys = "di{"
expected_buffer = "fn x() {\n}\n"
expected_cursor = [1, 0]

# Multi-line `di{` triggered from the opening-brace line behaves the same.
[[cases]]
name = "textobj_di_curlybrace_from_open_line"
initial_buffer = "fn x() {\n    body\n}\n"
initial_cursor = [0, 7]
keys = "di{"
expected_buffer = "fn x() {\n}\n"
expected_cursor = [1, 0]

# Multi-line `di{` with several body lines deletes all of them (linewise).
[[cases]]
name = "textobj_di_curlybrace_multiline_two_body"
initial_buffer = "{\n  a\n  b\n}\n"
initial_cursor = [1, 2]
keys = "di{"
expected_buffer = "{\n}\n"
expected_cursor = [1, 0]

# `di{` on an empty block is a no-op (nothing inside the braces).
[[cases]]
name = "textobj_di_curlybrace_empty"
initial_buffer = "a {} b\n"
initial_cursor = [0, 3]
keys = "di{"
expected_buffer = "a {} b\n"
expected_cursor = [0, 3]

# `di{` inside nested braces deletes only the innermost pair's contents.
[[cases]]
name = "textobj_di_curlybrace_nested_innermost"
initial_buffer = "{ a { b } c }\n"
initial_cursor = [0, 6]
keys = "di{"
expected_buffer = "{ a {} c }\n"
expected_cursor = [0, 5]

# `di{` with the cursor ON the opening brace.
[[cases]]
name = "textobj_di_curlybrace_on_open"
initial_buffer = "x {a b} y\n"
initial_cursor = [0, 2]
keys = "di{"
expected_buffer = "x {} y\n"
expected_cursor = [0, 3]

# `di{` with the cursor BEFORE the opening brace on the same line still finds
# the block: vim's `i{` scans forward along the current line.
[[cases]]
name = "textobj_di_curlybrace_before_on_line"
initial_buffer = "x {a b} y\n"
initial_cursor = [0, 0]
keys = "di{"
expected_buffer = "x {} y\n"
expected_cursor = [0, 3]

# `di{` on a single-line block with content on the brace line.
[[cases]]
name = "textobj_di_curlybrace_content_then_close"
initial_buffer = "foo { bar }\n"
initial_cursor = [0, 7]
keys = "di{"
expected_buffer = "foo {}\n"
expected_cursor = [0, 5]

# `di{` with the cursor sitting ON the closing brace still deletes the inner
# span. Before the fix, find_open_bracket counted the cursor's own `}` and
# skipped past its matching `{`, making this a silent no-op.
[[cases]]
name = "textobj_di_curlybrace_on_close"
initial_buffer = "x {a b} y\n"
initial_cursor = [0, 6]
keys = "di{"
expected_buffer = "x {} y\n"
expected_cursor = [0, 3]

# Same fix, multi-line: cursor on the `}` line deletes the inner body.
[[cases]]
name = "textobj_di_curlybrace_on_close_multiline"
initial_buffer = "fn x() {\n    body\n}\n"
initial_cursor = [2, 0]
keys = "di{"
expected_buffer = "fn x() {\n}\n"
expected_cursor = [1, 0]

# NOTE: the di{ scenarios below still DIVERGE from neovim and are tracked in
# corpus/known_divergences.toml for a follow-up `current_block` rewrite:
#   - whitespace-only body `{\n   \n}` → hjkl deletes the line, nvim leaves it
#   - open-brace line has trailing content `{ a\n  b\n}` → hjkl `{ a\n}`,
#     nvim strips the open trailing too, giving `{\n}`
#   - count `2di{` → hjkl ignores the count, nvim targets the outer pair
