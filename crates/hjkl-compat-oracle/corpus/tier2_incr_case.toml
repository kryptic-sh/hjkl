# Tier 2 — `g<C-a>` / `g<C-x>` sequential increment over a visual selection,
# plus coverage for the line-wise case doubles `gUU` / `guu` / `g~~`.
#
# Driven in-process and live-compared against `nvim --headless`.

# ── g CTRL-A / g CTRL-X — sequential increment across selected lines ───────

# `g<C-a>` turns a column of identical numbers into an ascending sequence.
[[cases]]
name = "g_ctrl_a_sequential"
initial_buffer = "0\n0\n0\n"
initial_cursor = [0, 0]
keys = "VGg<C-a>"
expected_buffer = "1\n2\n3\n"
expected_mode = "normal"

# `g<C-x>` is the descending counterpart.
[[cases]]
name = "g_ctrl_x_sequential"
initial_buffer = "5\n5\n5\n"
initial_cursor = [0, 0]
keys = "VGg<C-x>"
expected_buffer = "4\n3\n2\n"
expected_mode = "normal"

# Sanity / regression: plain visual `<C-a>` adds the SAME amount to each line
# (not sequential) — contrasts with `g<C-a>`.
[[cases]]
name = "visual_ctrl_a_uniform"
initial_buffer = "1\n1\n1\n"
initial_cursor = [0, 0]
keys = "VG<C-a>"
expected_buffer = "2\n2\n2\n"
expected_mode = "normal"

# ── gUU / guu / g~~ — line-wise case transforms ───────────────────────────

[[cases]]
name = "gUU_uppercases_line"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = "gUU"
expected_buffer = "HELLO WORLD\n"
expected_mode = "normal"

[[cases]]
name = "guu_lowercases_line"
initial_buffer = "Hello World\n"
initial_cursor = [0, 0]
keys = "guu"
expected_buffer = "hello world\n"
expected_mode = "normal"

[[cases]]
name = "g_tilde_tilde_toggles_line"
initial_buffer = "Hello World\n"
initial_cursor = [0, 0]
keys = "g~~"
expected_buffer = "hELLO wORLD\n"
expected_mode = "normal"

# Count applies to the line-wise double: `2g~~` toggles two lines.
[[cases]]
name = "g_tilde_tilde_count"
initial_buffer = "Ab\nCd\nEf\n"
initial_cursor = [0, 0]
keys = "2g~~"
expected_buffer = "aB\ncD\nEf\n"
expected_mode = "normal"
