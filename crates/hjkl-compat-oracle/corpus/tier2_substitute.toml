# Tier 2 substitute corpus — `:s/pat/repl/flags` cases driven via the
# nvim-api subprocess (NOT in-process key replay). Mirrors the
# `nvim_api_tier.toml` runner pattern — requires `cargo build -p hjkl`
# beforehand.
#
# All buffers are ASCII-only.

# `:s/foo/bar/g` replaces all matches on current line.
[[cases]]
name = "subst_g_flag_all_on_line"
initial_buffer = "foo foo foo\n"
initial_cursor = [0, 0]
keys = ":s/foo/bar/g<CR>"
expected_buffer = "bar bar bar\n"
expected_cursor = [0, 0]

# `:%s/foo/bar/g` global over whole buffer.
[[cases]]
name = "subst_percent_g_global"
initial_buffer = "foo\nfoo foo\n"
initial_cursor = [0, 0]
keys = ":%s/foo/bar/g<CR>"
expected_buffer = "bar\nbar bar\n"
expected_cursor = [1, 0]

# `:s/FOO/bar/i` case-insensitive match.
[[cases]]
name = "subst_i_case_insensitive"
initial_buffer = "FOO bar\n"
initial_cursor = [0, 0]
keys = ":s/FOO/bar/i<CR>"
expected_buffer = "bar bar\n"
expected_cursor = [0, 0]

# `:s/foo/BAR/` single match, no flags.
[[cases]]
name = "subst_basic_single_match"
initial_buffer = "foo foo\n"
initial_cursor = [0, 0]
keys = ":s/foo/BAR/<CR>"
expected_buffer = "BAR foo\n"
expected_cursor = [0, 0]

# `:s/xyz/bar/` no match — buffer unchanged.
[[cases]]
name = "subst_no_match_noop"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":s/xyz/bar/<CR>"
expected_buffer = "hello world\n"
expected_cursor = [0, 0]

# `:s/foo/bar/i` on "Foo" — /i flag explicitly forces case-insensitive;
# default ic+smart would also match (all-lower "foo" → Insensitive), but this
# tests that /i flag path works regardless.
# Verified against nvim v0.12.2: buffer becomes "bar\n", cursor [0,0].
[[cases]]
name = "substitute_i_flag_overrides_pattern_case"
initial_buffer = "Foo\n"
initial_cursor = [0, 0]
keys = ":s/foo/bar/i<CR>"
expected_buffer = "bar\n"
expected_cursor = [0, 0]

# `\r` in the replacement inserts a line break (split-on-delimiter idiom).
[[cases]]
name = "subst_backslash_r_splits_lines"
initial_buffer = "a,b,c\n"
initial_cursor = [0, 0]
keys = ":s/,/\\r/g<CR>"
expected_buffer = "a\nb\nc\n"

# `\t` in the replacement inserts a tab.
[[cases]]
name = "subst_backslash_t_inserts_tab"
initial_buffer = "a,b\n"
initial_cursor = [0, 0]
keys = ":s/,/\\t/<CR>"
expected_buffer = "a\tb\n"

# A literal `$` in the replacement stays literal (vim uses `\1` for captures).
[[cases]]
name = "subst_literal_dollar_stays_literal"
initial_buffer = "x\n"
initial_cursor = [0, 0]
keys = ":s/x/$5/<CR>"
expected_buffer = "$5\n"

# `\0` is the whole match (like `&`).
[[cases]]
name = "subst_backslash_zero_whole_match"
initial_buffer = "foo\n"
initial_cursor = [0, 0]
keys = ":s/foo/[\\0]/<CR>"
expected_buffer = "[foo]\n"

# After `:s`, the cursor lands on the first non-blank of the changed line.
[[cases]]
name = "subst_cursor_first_non_blank"
initial_buffer = "  x\n"
initial_cursor = [0, 2]
keys = ":s/x/y/<CR>"
expected_buffer = "  y\n"
expected_cursor = [0, 2]

# `\U…\E` uppercases a run in the replacement.
[[cases]]
name = "subst_case_upper_run"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":s/world/\\U&\\E/<CR>"
expected_buffer = "hello WORLD\n"

# `\u` uppercases only the next character.
[[cases]]
name = "subst_case_one_upper"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":s/hello/\\u&/<CR>"
expected_buffer = "Hello world\n"

# `\L…\E` lowercases a run.
[[cases]]
name = "subst_case_lower_run"
initial_buffer = "HELLO WORLD\n"
initial_cursor = [0, 0]
keys = ":s/WORLD/\\L&\\E/<CR>"
expected_buffer = "HELLO world\n"

# `~` in the replacement reuses the previous substitute's replacement string.
# First `:s/a/X/` sets it to "X"; then `:s/b/~/` replaces b with X.
[[cases]]
name = "subst_tilde_previous_replacement"
initial_buffer = "a b\n"
initial_cursor = [0, 0]
keys = ":s/a/X/<CR>:s/b/~/<CR>"
expected_buffer = "X X\n"

# `n` flag: report the match count without modifying the buffer or cursor.
[[cases]]
name = "subst_n_flag_reports_no_change"
initial_buffer = "foo boo\n"
initial_cursor = [0, 0]
keys = ":s/o/0/gn<CR>"
expected_buffer = "foo boo\n"
expected_cursor = [0, 0]

# Trailing `[count]`: operate on `count` lines from the (cursor) line.
[[cases]]
name = "subst_trailing_count_spans_lines"
initial_buffer = "x\nx\nx\n"
initial_cursor = [0, 0]
keys = ":s/x/y/g 2<CR>"
expected_buffer = "y\ny\nx\n"
