# Tier 2 advanced corpus — 10 cases covering register semantics, increment/
# decrement, insert-mode delete shortcuts, gi, counted operators, and clamping.
#
# All buffers are ASCII-only.
# Cursor positions: 0-based (row, col).

# ─── Register semantics ───────────────────────────────────────────────────────

# `"0` register preserves the last explicit yank even after a delete.
# yiw yanks "foo" into "0 and "; then w moves to "bar", dw deletes "bar "
# (overwrites ") but "0 still holds "foo". `"0p` pastes "foo" after cursor.
# After dw: "foo baz\n", cursor on 'b' (col 4). "0p inserts "foo" after 'b'.
[[cases]]
name = "register_yank_zero_after_delete"
initial_buffer = "foo bar baz\n"
initial_cursor = [0, 0]
keys = "yiwwdw\"0p"
expected_buffer = "foo bfooaz\n"
expected_cursor = [0, 7]

# `"_` (black-hole) register case has a known divergence between hjkl and nvim
# in the paste position after "_ delete. Moved to known_divergences.toml.

# ─── Increment / decrement ────────────────────────────────────────────────────

# `<C-a>` increments the number under cursor (42 → 43).
[[cases]]
name = "incr_C-a"
initial_buffer = "foo 42 bar\n"
initial_cursor = [0, 4]
keys = "<C-a>"
expected_buffer = "foo 43 bar\n"
expected_cursor = [0, 4]

# `<C-x>` decrements the number under cursor (42 → 41).
[[cases]]
name = "decr_C-x"
initial_buffer = "foo 42 bar\n"
initial_cursor = [0, 4]
keys = "<C-x>"
expected_buffer = "foo 41 bar\n"
expected_cursor = [0, 4]

# ─── Insert mode delete shortcuts ────────────────────────────────────────────

# `<C-w>` in insert mode deletes the preceding word.
# Start at end of "hello "; insert mode active; <C-w> deletes "hello ".
[[cases]]
name = "insert_C-w_delete_word"
initial_buffer = "hello world\n"
initial_cursor = [0, 5]
keys = "a<C-w><Esc>"
expected_buffer = "world\n"
expected_cursor = [0, 0]

# `<C-u>` in insert mode deletes from cursor back to line start.
# Cursor mid-word; enter insert after col 4; <C-u> clears back to col 0.
[[cases]]
name = "insert_C-u_delete_to_line_start"
initial_buffer = "hello world\n"
initial_cursor = [0, 4]
keys = "i<C-u><Esc>"
expected_buffer = "o world\n"
expected_cursor = [0, 0]

# `gi` re-enter insert has a known divergence: hjkl stays on the current row
# after `jgi` instead of returning to the last-insert row. Moved to
# known_divergences.toml.

# ─── Counted operators ────────────────────────────────────────────────────────

# `3yy` yanks 3 lines linewise into unnamed register.
[[cases]]
name = "count_3yy_yanks_three_lines"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "3yy"
expected_buffer = "one\ntwo\nthree\nfour\n"
expected_cursor = [0, 0]
expected_register = ['"', "one\ntwo\nthree\n"]

# `5j` moves cursor down 5 rows.
[[cases]]
name = "count_5j_moves_5_rows"
initial_buffer = "a\nb\nc\nd\ne\nf\n"
initial_cursor = [0, 0]
keys = "5j"
expected_buffer = "a\nb\nc\nd\ne\nf\n"
expected_cursor = [5, 0]

# `100G` clamping has a known divergence: hjkl lands on row 3 (phantom row
# after trailing newline) instead of row 2 (last content row). Moved to
# known_divergences.toml.
