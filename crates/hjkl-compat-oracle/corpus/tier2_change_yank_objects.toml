expected_cursor = [0, 2]
expected_register = ["\"", "{a b}"]
[[cases]]
name = "textobj_ca_doublequote"
initial_buffer = "x \"a b\" y\n"
initial_cursor = [0, 4]
keys = "ca\"Z<Esc>"
expected_buffer = "x Zy\n"
expected_cursor = [0, 2]
expected_register = ["\"", "\"a b\" "]
[[cases]]
name = "textobj_ca_paragraph"
initial_buffer = "alpha beta\n\ngamma\n"
initial_cursor = [0, 0]
keys = "capZ<Esc>"
expected_buffer = "Z\ngamma\n"
expected_cursor = [0, 0]
expected_register = ["\"", "alpha beta\n\n"]
[[cases]]
name = "textobj_ca_paren"
initial_buffer = "x (a b) y\n"
initial_cursor = [0, 4]
keys = "ca(Z<Esc>"
expected_buffer = "x Z y\n"
expected_cursor = [0, 2]
expected_register = ["\"", "(a b)"]
[[cases]]
name = "textobj_ca_singlequote"
initial_buffer = "x 'a b' y\n"
initial_cursor = [0, 4]
keys = "ca'Z<Esc>"
expected_buffer = "x Zy\n"
expected_cursor = [0, 2]
expected_register = ["\"", "'a b' "]
[[cases]]
name = "textobj_ca_squarebracket"
initial_buffer = "x [a b] y\n"
initial_cursor = [0, 4]
keys = "ca[Z<Esc>"
expected_buffer = "x Z y\n"
expected_cursor = [0, 2]
expected_register = ["\"", "[a b]"]
[[cases]]
name = "textobj_ca_tag"
initial_buffer = "<a>x y</a>\n"
initial_cursor = [0, 4]
keys = "catZ<Esc>"
expected_buffer = "Z\n"
expected_cursor = [0, 0]
expected_register = ["\"", "<a>x y</a>"]
[[cases]]
name = "textobj_ca_word"
initial_buffer = "foo bar baz\n"
initial_cursor = [0, 4]
keys = "cawZ<Esc>"
expected_buffer = "foo Zbaz\n"
expected_cursor = [0, 4]
expected_register = ["\"", "bar "]

