# ─── Operators × motions ──────────────────────────────────────────────────────

[[cases]]
name = "operator_dw_delete_word"
initial_buffer = "foo bar baz\n"
initial_cursor = [0, 0]
keys = "dw"
expected_buffer = "bar baz\n"
expected_cursor = [0, 0]

[[cases]]
name = "operator_dd_delete_line"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 0]
keys = "dd"
expected_buffer = "bar\nbaz\n"
expected_cursor = [0, 0]

# KNOWN_DIVERGENCE: after dd on last line, hjkl cursor stays at row 1 (past end)
# instead of clamping to row 0 (the new last line)
[[cases]]
name = "DIVERGENCE_operator_dd_last_line"
initial_buffer = "foo\nbar\n"
initial_cursor = [1, 0]
keys = "dd"
expected_buffer = "foo\n"
expected_cursor = [0, 0]

# KNOWN_DIVERGENCE: after d$, hjkl cursor col is 5 (past last char) instead of 4
# on "hello\n"; off-by-one in post-operator cursor clamp
[[cases]]
name = "DIVERGENCE_operator_d_dollar_to_eol"
initial_buffer = "hello world\n"
initial_cursor = [0, 5]
keys = "d$"
expected_buffer = "hello\n"
expected_cursor = [0, 4]

[[cases]]
name = "operator_d_zero_to_sol"
initial_buffer = "hello world\n"
initial_cursor = [0, 5]
keys = "d0"
expected_buffer = " world\n"
expected_cursor = [0, 0]

[[cases]]
name = "operator_cw_change_word"
initial_buffer = "foo bar\n"
initial_cursor = [0, 0]
keys = "cwhey<Esc>"
expected_buffer = "hey bar\n"
expected_cursor = [0, 2]
expected_mode = "normal"

[[cases]]
name = "operator_cc_change_line"
initial_buffer = "hello\nworld\n"
initial_cursor = [0, 0]
keys = "ccbye<Esc>"
expected_buffer = "bye\nworld\n"
expected_cursor = [0, 2]
expected_mode = "normal"

[[cases]]
name = "operator_yw_yank_word"
initial_buffer = "foo bar\n"
initial_cursor = [0, 0]
keys = "yw"
expected_buffer = "foo bar\n"
expected_cursor = [0, 0]
expected_register = ['"', "foo "]

[[cases]]
name = "operator_yy_yank_line"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "yy"
expected_buffer = "foo\nbar\n"
expected_cursor = [0, 0]
expected_register = ['"', "foo\n"]

[[cases]]
name = "operator_D_delete_to_eol"
initial_buffer = "hello world\n"
initial_cursor = [0, 5]
keys = "D"
expected_buffer = "hello\n"
expected_cursor = [0, 4]

[[cases]]
name = "operator_C_change_to_eol"
initial_buffer = "hello world\n"
initial_cursor = [0, 5]
keys = "Cnew<Esc>"
expected_buffer = "hellonew\n"
expected_cursor = [0, 7]
expected_mode = "normal"

[[cases]]
name = "operator_Y_yank_line_shortcut"
initial_buffer = "hello\nworld\n"
initial_cursor = [0, 0]
keys = "Y"
expected_buffer = "hello\nworld\n"
expected_cursor = [0, 0]
expected_register = ['"', "hello\n"]

[[cases]]
name = "operator_count_3w_skip_words"
initial_buffer = "one two three four\n"
initial_cursor = [0, 0]
keys = "3w"
expected_buffer = "one two three four\n"
expected_cursor = [0, 14]

[[cases]]
name = "operator_d2j_delete_lines_down"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "d2j"
expected_buffer = "four\n"
expected_cursor = [0, 0]

# ─── Text objects ─────────────────────────────────────────────────────────────

[[cases]]
name = "textobj_daw_delete_around_word"
initial_buffer = "foo bar baz\n"
initial_cursor = [0, 4]
keys = "daw"
expected_buffer = "foo baz\n"
expected_cursor = [0, 4]

[[cases]]
name = "textobj_diw_delete_inner_word"
initial_buffer = "foo bar baz\n"
initial_cursor = [0, 4]
keys = "diw"
expected_buffer = "foo  baz\n"
expected_cursor = [0, 4]

# KNOWN_DIVERGENCE: da" in hjkl does not eat the adjacent whitespace after the
# closing quote; leaves "say  there\n" (double space) vs nvim's "say there\n"
[[cases]]
name = "DIVERGENCE_textobj_da_doublequote"
initial_buffer = "say \"hello\" there\n"
initial_cursor = [0, 6]
keys = "da\""
expected_buffer = "say there\n"
expected_cursor = [0, 4]

[[cases]]
name = "textobj_di_doublequote"
initial_buffer = "say \"hello\" there\n"
initial_cursor = [0, 6]
keys = "di\""
expected_buffer = "say \"\" there\n"
expected_cursor = [0, 5]

[[cases]]
name = "textobj_da_paren"
initial_buffer = "foo(bar)baz\n"
initial_cursor = [0, 4]
keys = "da)"
expected_buffer = "foobaz\n"
expected_cursor = [0, 3]

[[cases]]
name = "textobj_di_paren"
initial_buffer = "foo(bar)baz\n"
initial_cursor = [0, 4]
keys = "di)"
expected_buffer = "foo()baz\n"
expected_cursor = [0, 4]

# KNOWN_DIVERGENCE: after daB on multiline brace block, hjkl cursor col is 7
# instead of nvim's 6; off-by-one in post-daB cursor placement
[[cases]]
name = "DIVERGENCE_textobj_daB_delete_around_brace"
initial_buffer = "fn x() {\n    body\n}\n"
initial_cursor = [1, 4]
keys = "daB"
expected_buffer = "fn x() \n"
expected_cursor = [0, 6]

# KNOWN_DIVERGENCE: diB on "{\n    body\n}\n" — hjkl collapses to "{}\n" (deletes
# all newlines inside braces), nvim correctly leaves "{\n}\n"
[[cases]]
name = "DIVERGENCE_textobj_diB_delete_inner_brace"
initial_buffer = "{\n    body\n}\n"
initial_cursor = [1, 4]
keys = "diB"
expected_buffer = "{\n}\n"
expected_cursor = [1, 0]

# Note: dat/dit (XML tag text objects) skipped — buffer complexity for
# well-formed XML tags is disproportionate to Tier 1 scope; reserved for Tier 2.

# ─── Counts ───────────────────────────────────────────────────────────────────

[[cases]]
name = "count_3w_motion"
initial_buffer = "a b c d e\n"
initial_cursor = [0, 0]
keys = "3w"
expected_buffer = "a b c d e\n"
expected_cursor = [0, 4]

[[cases]]
name = "count_d3j_delete_lines"
initial_buffer = "1\n2\n3\n4\n5\n"
initial_cursor = [0, 0]
keys = "d3j"
expected_buffer = "5\n"
expected_cursor = [0, 0]

# KNOWN_DIVERGENCE: hjkl does not fill the default register on x/X; nvim puts
# deleted chars into `"` so they can be retrieved with p/P
[[cases]]
name = "DIVERGENCE_count_5x_delete_chars"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = "5x"
expected_buffer = " world\n"
expected_cursor = [0, 0]
expected_register = ['"', "hello"]

# ─── Insert mode basics ───────────────────────────────────────────────────────

[[cases]]
name = "insert_i_insert_before"
initial_buffer = "world\n"
initial_cursor = [0, 0]
keys = "ihello <Esc>"
expected_buffer = "hello world\n"
expected_cursor = [0, 5]
expected_mode = "normal"

[[cases]]
name = "insert_a_append_after"
initial_buffer = "hello\n"
initial_cursor = [0, 4]
keys = "a world<Esc>"
expected_buffer = "hello world\n"
expected_cursor = [0, 10]
expected_mode = "normal"

[[cases]]
name = "insert_o_open_below"
initial_buffer = "foo\nbaz\n"
initial_cursor = [0, 0]
keys = "obar<Esc>"
expected_buffer = "foo\nbar\nbaz\n"
expected_cursor = [1, 2]
expected_mode = "normal"

[[cases]]
name = "insert_O_open_above"
initial_buffer = "foo\nbar\n"
initial_cursor = [1, 0]
keys = "Obaz<Esc>"
expected_buffer = "foo\nbaz\nbar\n"
expected_cursor = [1, 2]
expected_mode = "normal"

[[cases]]
name = "insert_A_append_eol"
initial_buffer = "hello\n"
initial_cursor = [0, 0]
keys = "A world<Esc>"
expected_buffer = "hello world\n"
expected_cursor = [0, 10]
expected_mode = "normal"

[[cases]]
name = "insert_I_insert_bol"
initial_buffer = "world\n"
initial_cursor = [0, 4]
keys = "Ihello <Esc>"
expected_buffer = "hello world\n"
expected_cursor = [0, 5]
expected_mode = "normal"

# ─── Undo / redo ──────────────────────────────────────────────────────────────

[[cases]]
name = "undo_dw_then_u_restores"
initial_buffer = "foo bar\n"
initial_cursor = [0, 0]
keys = "dwu"
expected_buffer = "foo bar\n"
expected_cursor = [0, 0]

[[cases]]
name = "undo_redo_cycle"
initial_buffer = "foo bar\n"
initial_cursor = [0, 0]
keys = "dwudw<C-r>"
expected_buffer = "bar\n"
expected_cursor = [0, 0]

# KNOWN_DIVERGENCE: after `a word<Esc>u`, hjkl cursor col is 5 (one past the
# last char of "hello") instead of 4; undo does not clamp cursor to last-valid col
[[cases]]
name = "DIVERGENCE_undo_insert_then_u"
initial_buffer = "hello\n"
initial_cursor = [0, 5]
keys = "a world<Esc>u"
expected_buffer = "hello\n"
expected_cursor = [0, 4]

# ─── Registers ────────────────────────────────────────────────────────────────

# yy yanks to unnamed register; yyp pastes the unnamed register below current line
[[cases]]
name = "register_yyp_yank_and_paste_default"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "yyp"
expected_buffer = "foo\nfoo\nbar\n"
expected_cursor = [1, 0]

[[cases]]
name = "register_ayy_yank_to_named"
initial_buffer = "hello\nworld\n"
initial_cursor = [0, 0]
keys = "\"ayy"
expected_buffer = "hello\nworld\n"
expected_cursor = [0, 0]
expected_register = ['a', "hello\n"]

[[cases]]
name = "register_add_delete_to_named"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "\"add"
expected_buffer = "bar\n"
expected_cursor = [0, 0]
expected_register = ['a', "foo\n"]
