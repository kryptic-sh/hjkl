# Tier 1 corpus — ~45 cases covering core vim motions, operators, text objects,
# counts, insert mode, undo/redo, and registers.
#
# All buffers are ASCII-only (char-col == byte-col invariant holds).
# Cases are grouped by category with TOML comments.
#
# Naming convention: <category>_<motion/op>_<descriptor>
# Cursor positions: 0-based (row, col).
# Cases marked DIVERGENCE_* expose confirmed hjkl engine bugs vs nvim.

# ─── Motions ──────────────────────────────────────────────────────────────────

[[cases]]
name = "motion_h_basic"
initial_buffer = "hello\n"
initial_cursor = [0, 3]
keys = "h"
expected_buffer = "hello\n"
expected_cursor = [0, 2]

[[cases]]
name = "motion_j_basic"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "j"
expected_buffer = "foo\nbar\n"
expected_cursor = [1, 0]

[[cases]]
name = "motion_k_basic"
initial_buffer = "foo\nbar\n"
initial_cursor = [1, 0]
keys = "k"
expected_buffer = "foo\nbar\n"
expected_cursor = [0, 0]

[[cases]]
name = "motion_l_basic"
initial_buffer = "hello\n"
initial_cursor = [0, 0]
keys = "l"
expected_buffer = "hello\n"
expected_cursor = [0, 1]

[[cases]]
name = "motion_w_basic"
initial_buffer = "foo bar baz\n"
initial_cursor = [0, 0]
keys = "w"
expected_buffer = "foo bar baz\n"
expected_cursor = [0, 4]

[[cases]]
name = "motion_b_basic"
initial_buffer = "foo bar baz\n"
initial_cursor = [0, 4]
keys = "b"
expected_buffer = "foo bar baz\n"
expected_cursor = [0, 0]

[[cases]]
name = "motion_e_basic"
initial_buffer = "foo bar\n"
initial_cursor = [0, 0]
keys = "e"
expected_buffer = "foo bar\n"
expected_cursor = [0, 2]

[[cases]]
name = "motion_zero_line_start"
initial_buffer = "  hello\n"
initial_cursor = [0, 4]
keys = "0"
expected_buffer = "  hello\n"
expected_cursor = [0, 0]

[[cases]]
name = "motion_caret_first_nonblank"
initial_buffer = "  hello\n"
initial_cursor = [0, 6]
keys = "^"
expected_buffer = "  hello\n"
expected_cursor = [0, 2]

[[cases]]
name = "motion_dollar_line_end"
initial_buffer = "hello\n"
initial_cursor = [0, 0]
keys = "$"
expected_buffer = "hello\n"
expected_cursor = [0, 4]

[[cases]]
name = "motion_gg_file_top"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [2, 0]
keys = "gg"
expected_buffer = "foo\nbar\nbaz\n"
expected_cursor = [0, 0]

# KNOWN_DIVERGENCE: G lands on phantom row 3 (past last line) instead of row 2
[[cases]]
name = "DIVERGENCE_motion_G_file_bottom"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 0]
keys = "G"
expected_buffer = "foo\nbar\nbaz\n"
expected_cursor = [2, 0]

[[cases]]
name = "motion_f_find_forward"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = "fl"
expected_buffer = "hello world\n"
expected_cursor = [0, 2]

[[cases]]
name = "motion_t_till_forward"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = "tl"
expected_buffer = "hello world\n"
expected_cursor = [0, 1]

[[cases]]
name = "motion_percent_paren_match"
initial_buffer = "foo(bar)\n"
initial_cursor = [0, 3]
keys = "%"
expected_buffer = "foo(bar)\n"
