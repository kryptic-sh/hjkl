# ─── Undo / redo ──────────────────────────────────────────────────────────────

[[cases]]
name = "undo_dw_then_u_restores"
initial_buffer = "foo bar\n"
initial_cursor = [0, 0]
keys = "dwu"
expected_buffer = "foo bar\n"
expected_cursor = [0, 0]

[[cases]]
name = "undo_redo_cycle"
initial_buffer = "foo bar\n"
initial_cursor = [0, 0]
keys = "dwudw<C-r>"
expected_buffer = "bar\n"
expected_cursor = [0, 0]

# ─── Registers ────────────────────────────────────────────────────────────────

# yy yanks to unnamed register; yyp pastes the unnamed register below current line
[[cases]]
name = "register_yyp_yank_and_paste_default"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "yyp"
expected_buffer = "foo\nfoo\nbar\n"
expected_cursor = [1, 0]

[[cases]]
name = "register_ayy_yank_to_named"
initial_buffer = "hello\nworld\n"
initial_cursor = [0, 0]
keys = "\"ayy"
expected_buffer = "hello\nworld\n"
expected_cursor = [0, 0]
expected_register = ['a', "hello\n"]

[[cases]]
name = "register_add_delete_to_named"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "\"add"
expected_buffer = "bar\n"
expected_cursor = [0, 0]
expected_register = ['a', "foo\n"]

# ─── Graduated from known_divergences (issue #24, fixed in 0.3.8) ────────────

# motion: G lands on last content row (not phantom trailing-empty row)
[[cases]]
name = "motion_G_file_bottom"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 0]
keys = "G"
expected_buffer = "foo\nbar\nbaz\n"
expected_cursor = [2, 0]

# operator: dd on last line clamps cursor to new last row
[[cases]]
name = "operator_dd_last_line"
initial_buffer = "foo\nbar\n"
initial_cursor = [1, 0]
keys = "dd"
expected_buffer = "foo\n"
expected_cursor = [0, 0]

# operator: d$ cursor lands on last char, not one past
[[cases]]
name = "operator_d_dollar_to_eol"
initial_buffer = "hello world\n"
initial_cursor = [0, 5]
keys = "d$"
expected_buffer = "hello\n"
expected_cursor = [0, 4]

# text-object: da" eats trailing whitespace
[[cases]]
name = "textobj_da_doublequote"
initial_buffer = "say \"hello\" there\n"
initial_cursor = [0, 6]
keys = "da\""
expected_buffer = "say there\n"
expected_cursor = [0, 4]

# text-object: daB cursor clamped to last col after multi-line around-brace delete
[[cases]]
name = "textobj_daB_delete_around_brace"
initial_buffer = "fn x() {\n    body\n}\n"
initial_cursor = [1, 4]
keys = "daB"
expected_buffer = "fn x() \n"
expected_cursor = [0, 6]

# text-object: diB preserves surrounding newlines on multi-line block
[[cases]]
name = "textobj_diB_delete_inner_brace"
initial_buffer = "{\n    body\n}\n"
initial_cursor = [1, 4]
keys = "diB"
expected_buffer = "{\n}\n"
expected_cursor = [1, 0]

# count: x/X populate unnamed register
[[cases]]
name = "count_5x_delete_chars"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = "5x"
expected_buffer = " world\n"
expected_cursor = [0, 0]
expected_register = ['"', "hello"]

# undo: cursor clamped to last valid col after undo
[[cases]]
name = "undo_insert_then_u"
initial_buffer = "hello\n"
initial_cursor = [0, 5]
keys = "a world<Esc>u"
expected_buffer = "hello\n"
expected_cursor = [0, 4]

# ─── Basic single-char ops ──────────────────────────────────────────────────

# x deletes char under cursor.
[[cases]]
name = "delete_x_single_char"
initial_buffer = "hello\n"
initial_cursor = [0, 1]
keys = "x"
expected_buffer = "hllo\n"
expected_cursor = [0, 1]

# X deletes char before cursor.
[[cases]]
name = "delete_X_char_before"
initial_buffer = "hello\n"
initial_cursor = [0, 3]
keys = "X"
expected_buffer = "helo\n"
expected_cursor = [0, 2]

# r<x> replaces char under cursor.
[[cases]]
name = "replace_r_single_char"
initial_buffer = "hello\n"
initial_cursor = [0, 1]
keys = "rX"
expected_buffer = "hXllo\n"
expected_cursor = [0, 1]

# ~ toggles case of char under cursor and advances right.
[[cases]]
name = "case_tilde_toggle_char"
initial_buffer = "abc\n"
initial_cursor = [0, 0]
keys = "~"
expected_buffer = "Abc\n"
expected_cursor = [0, 1]

# J joins next line with single space separator.
[[cases]]
name = "join_J_with_space"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "J"
expected_buffer = "foo bar\n"
expected_cursor = [0, 3]

# p pastes unnamed register after cursor (charwise yank → charwise paste).
[[cases]]
name = "paste_p_charwise_after_yiw"
initial_buffer = "foo bar\n"
initial_cursor = [0, 0]
keys = "yiwlp"
expected_buffer = "fofooo bar\n"
expected_cursor = [0, 4]

# P pastes unnamed register before cursor.
[[cases]]
name = "paste_P_charwise_before_yiw"
initial_buffer = "foo bar\n"
initial_cursor = [0, 4]
keys = "yiwP"
expected_buffer = "foo barbar\n"
expected_cursor = [0, 6]

# ─── Word variants (big-word, find-back, repeat) ────────────────────────────

# W skips to next WORD (whitespace-delimited, ignores punctuation).
[[cases]]
name = "motion_W_big_word_forward"
initial_buffer = "foo-bar baz\n"
initial_cursor = [0, 0]
keys = "W"
expected_buffer = "foo-bar baz\n"
expected_cursor = [0, 8]

# B reverses to previous WORD.
[[cases]]
name = "motion_B_big_word_back"
initial_buffer = "foo-bar baz\n"
initial_cursor = [0, 8]
keys = "B"
expected_buffer = "foo-bar baz\n"
expected_cursor = [0, 0]

# E lands on end of WORD.
[[cases]]
name = "motion_E_big_word_end"
initial_buffer = "foo-bar baz\n"
initial_cursor = [0, 0]
keys = "E"
expected_buffer = "foo-bar baz\n"
expected_cursor = [0, 6]

# F finds char backward on line.
[[cases]]
name = "motion_F_find_backward"
initial_buffer = "hello\n"
initial_cursor = [0, 4]
keys = "Fl"
expected_buffer = "hello\n"
expected_cursor = [0, 2]

# T lands just-after char backward on line.
[[cases]]
name = "motion_T_till_backward"
initial_buffer = "hello\n"
initial_cursor = [0, 4]
keys = "Tl"
expected_buffer = "hello\n"
expected_cursor = [0, 3]

# ; repeats last f/t in same direction.
[[cases]]
name = "motion_semicolon_repeats_find"
initial_buffer = "abcabc\n"
initial_cursor = [0, 0]
keys = "fa;"
expected_buffer = "abcabc\n"
expected_cursor = [0, 3]

# , repeats last f/t in reverse direction.
[[cases]]
name = "motion_comma_reverses_find"
initial_buffer = "abcabc\n"
initial_cursor = [0, 0]
keys = "fa;,"
expected_buffer = "abcabc\n"
expected_cursor = [0, 0]

# ─── Issue #31: new motions +/<CR>, -, _, [[, ]], [], ][ ──────────────────────

# + moves to first non-blank of next line (linewise).
[[cases]]
name = "motion_plus_first_non_blank_next_line"
initial_buffer = "foo\n    bar\nbaz\n"
initial_cursor = [0, 0]
keys = "+"
expected_buffer = "foo\n    bar\nbaz\n"
expected_cursor = [1, 4]

# <CR> is identical to + in normal mode.
[[cases]]
name = "motion_cr_first_non_blank_next_line"
initial_buffer = "foo\n    bar\nbaz\n"
initial_cursor = [0, 0]
keys = "<CR>"
expected_buffer = "foo\n    bar\nbaz\n"
expected_cursor = [1, 4]

# 3+ from row 0 lands on row 3 first non-blank.
[[cases]]
name = "motion_plus_count_3"
initial_buffer = "a\nb\n  c\nd\n"
initial_cursor = [0, 0]
keys = "3+"
expected_buffer = "a\nb\n  c\nd\n"
expected_cursor = [3, 0]

# - moves to first non-blank of previous line (linewise).
[[cases]]
name = "motion_minus_first_non_blank_prev_line"
initial_buffer = "  hello\nworld\n"
initial_cursor = [1, 0]
keys = "-"
expected_buffer = "  hello\nworld\n"
expected_cursor = [0, 2]

# 2- from row 2 lands on row 0 first non-blank.
[[cases]]
name = "motion_minus_count_2"
initial_buffer = "  a\nb\nc\n"
initial_cursor = [2, 0]
keys = "2-"
expected_buffer = "  a\nb\nc\n"
expected_cursor = [0, 2]

# _ lands on first non-blank of current line (count=1).
[[cases]]
name = "motion_underscore_current_line"
initial_buffer = "    hello\nworld\n"
initial_cursor = [0, 0]
keys = "_"
expected_buffer = "    hello\nworld\n"
expected_cursor = [0, 4]

# 3_ from row 0: count-1=2 lines down.
[[cases]]
name = "motion_underscore_count_3"
initial_buffer = "a\n  b\nc\n  d\n"
initial_cursor = [0, 0]
keys = "3_"
expected_buffer = "a\n  b\nc\n  d\n"
expected_cursor = [2, 0]

# d+ deletes linewise (current + next line).
[[cases]]
name = "op_d_plus_linewise_delete"
initial_buffer = "one\ntwo\nthree\n"
initial_cursor = [0, 0]
keys = "d+"
expected_buffer = "three\n"
expected_cursor = [0, 0]

# d- deletes linewise (prev + current line).
[[cases]]
name = "op_d_minus_linewise_delete"
initial_buffer = "one\ntwo\nthree\n"
initial_cursor = [1, 0]
keys = "d-"
expected_buffer = "three\n"
expected_cursor = [0, 0]

# d_ deletes current line (count=1, linewise).
[[cases]]
name = "op_d_underscore_linewise_current"
initial_buffer = "one\ntwo\nthree\n"
initial_cursor = [0, 0]
keys = "d_"
expected_buffer = "two\nthree\n"
expected_cursor = [0, 0]

# [[ backward to { at col 0.
[[cases]]
name = "motion_double_bracket_open_backward"
initial_buffer = "preamble\n{\nfoo\n}\n"
initial_cursor = [3, 0]
keys = "[["
expected_buffer = "preamble\n{\nfoo\n}\n"
expected_cursor = [1, 0]

# ]] forward to { at col 0.
[[cases]]
name = "motion_double_bracket_close_forward"
initial_buffer = "preamble\n{\nfoo\n}\nafter\n"
initial_cursor = [0, 0]
keys = "]]"
expected_buffer = "preamble\n{\nfoo\n}\nafter\n"
expected_cursor = [1, 0]

# [] backward to } at col 0.
[[cases]]
name = "motion_bracket_close_open_backward"
initial_buffer = "before\n}\nafter\n"
initial_cursor = [2, 0]
keys = "[]"
expected_buffer = "before\n}\nafter\n"
expected_cursor = [1, 0]

# ][ forward to } at col 0.
[[cases]]
name = "motion_bracket_open_close_forward"
initial_buffer = "before\n}\nafter\n"
initial_cursor = [0, 0]
keys = "]["
expected_buffer = "before\n}\nafter\n"
expected_cursor = [1, 0]

# ─── N| column-jump motion (#169) ──────────────────────────────────────────────

# 5| jumps to column 5 (index 4, 1-based).
[[cases]]
name = "motion_pipe_goto_col5"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = "5|"
expected_buffer = "hello world\n"
expected_cursor = [0, 4]

# bare | (no count) jumps to column 1 (index 0).
[[cases]]
name = "motion_pipe_no_count_col1"
initial_buffer = "hello world\n"
initial_cursor = [0, 7]
keys = "|"
expected_buffer = "hello world\n"
expected_cursor = [0, 0]

# d| deletes from cursor to column 1 (exclusive: col 0 not included when cursor is there).
[[cases]]
name = "op_d_pipe_delete_to_col1"
initial_buffer = "hello\n"
initial_cursor = [0, 3]
keys = "d|"
expected_buffer = "lo\n"
expected_cursor = [0, 0]

# d5| deletes to column 5.
[[cases]]
name = "op_d_pipe_count_delete_to_col5"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = "d5|"
expected_buffer = "o world\n"
expected_cursor = [0, 0]
