# Tier 2 — register semantics, verified through their buffer effects (the oracle
# only surfaces the unnamed register directly, so named / numbered / special
# registers are exercised by yanking into them and pasting back).
#
# Expected buffers captured from `nvim --headless`.

# Numbered yank-ring: each `dd` shifts the previous delete down the ring, so
# after two deletes `"1` holds the most recent and `"2` the one before.
#   dd (del a → "1=a), dd (del b → "1=b, "2=a), "1p (paste b), "2p (paste a)
[[cases]]
name = "register_numbered_ring_after_deletes"
initial_buffer = "a\nb\nc\nd\n"
initial_cursor = [0, 0]
keys = "dddd\"1p\"2p"
expected_buffer = "c\nb\na\nd\n"
expected_mode = "normal"

# Small-delete register `"-` holds the most recent intra-line delete.
#   x (del a → "-=a), x (del b → "-=b), $ (end), "-p (paste b after d)
[[cases]]
name = "register_small_delete_dash"
initial_buffer = "abcd\n"
initial_cursor = [0, 0]
keys = "xx$\"-p"
expected_buffer = "cdb\n"
expected_mode = "normal"

# Blackhole register `"_` discards text WITHOUT touching the yank register, so
# a prior yank (`"0`) survives a `"_dd`.
#   yiw (yank foo → "0), j, "_dd (blackhole-delete bar), k, "0p (paste foo)
[[cases]]
name = "register_blackhole_preserves_yank"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 0]
keys = "yiwj\"_ddk\"0p"
expected_buffer = "ffoooo\nbaz\n"
expected_mode = "normal"

# Uppercase register name APPENDS to the named register.
#   "ayy (a="aaa\n"), j, "Ayy (append → a="aaa\nbbb\n"), o<Esc>, "ap (paste both)
[[cases]]
name = "register_named_append_uppercase"
initial_buffer = "aaa\nbbb\n"
initial_cursor = [0, 0]
keys = "\"ayyj\"Ayyo<Esc>\"ap"
expected_buffer = "aaa\nbbb\n\naaa\nbbb\n"
expected_mode = "normal"

# Small-delete register `"-` survives a later LINEWISE delete. A charwise `x`
# fills "- with "a"; a following `dd` fills the numbered ring and the unnamed
# register (linewise "bc\n") but must NOT touch "-. Pasting "- then yields the
# charwise "a", not the unnamed line. (Discriminates "- from the unnamed reg:
# a fallback to unnamed would paste "bc\n" on a new line instead.)
[[cases]]
name = "register_dash_survives_linewise_delete"
initial_buffer = "abc\nxyz\n"
initial_cursor = [0, 0]
keys = "xdd\"-p"
expected_buffer = "xayz\n"
expected_mode = "normal"

# Yank into a NAMED register must not clobber `"0`. `yy` sets "0 to "foo\n";
# `"ayy` on the next line names register a, leaving "0 untouched; `"0p` pastes
# the original "foo\n". (A bug that overwrote "0 would paste "bar\n".)
[[cases]]
name = "register_zero_survives_named_yank"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "yyj\"ayy\"0p"
expected_buffer = "foo\nbar\nfoo\n"
expected_mode = "normal"

# A small (sub-line) delete must NOT rotate the numbered ring. `dd` puts "L1\n"
# in "1; a following `x` is a small delete (goes to "-), so "1 still holds
# "L1\n" and `"1p` pastes it. (A bug that rotated the ring on `x` would leave
# "1 = "L" and paste that instead.)
[[cases]]
name = "register_ring_unshifted_by_small_delete"
initial_buffer = "L1\nL2\nL3\n"
initial_cursor = [0, 0]
keys = "ddx\"1p"
expected_buffer = "2\nL1\nL3\n"
expected_mode = "normal"

# #280 — linewise Visual delete reaching the buffer's TRUE last row must not
# capture ropey's phantom trailing row as an extra newline. The oracle compares
# the default register against real nvim, so this pins `"` == "one\ntwo\nthree
# \nfour\n" exactly (a phantom-row regression would capture "...four\n\n").
# The repro was fixed as a side effect of the round-3 phantom-row clamps; this
# case keeps it fixed.
[[cases]]
name = "register_linewise_delete_to_buffer_end"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "VGd"
expected_buffer = ""
expected_mode = "normal"

# NEGATIVE for #280 — a linewise delete NOT reaching the last row keeps its
# normal register shape: exactly "one\ntwo\n" (one trailing \n per line, no
# more, no fewer). Guards against an over-eager clamp that trims a legitimate
# trailing newline.
[[cases]]
name = "register_linewise_delete_not_reaching_end"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "Vjd"
expected_buffer = "three\nfour\n"
expected_mode = "normal"

# `dG` from mid-buffer — same phantom-row family through the operator+motion
# path (`run_operator_over_range`) instead of the Visual path.
[[cases]]
name = "register_dG_from_mid_buffer"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [1, 0]
keys = "dG"
expected_buffer = "one\n"
expected_mode = "normal"

# `yG` — the linewise yank capture (`read_vim_range`) must agree with nvim on
# the same phantom-row boundary.
[[cases]]
name = "register_yG_to_buffer_end"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "yG"
expected_buffer = "one\ntwo\nthree\nfour\n"
expected_mode = "normal"

# A TRUE no-op linewise delete (zero chars removed) must leave every register
# untouched, matching nvim. The first `VGd` empties the buffer and seeds `"`
# with the full text; the second `VGd` on the lone empty line removes nothing,
# so `"` must still hold "one\ntwo\nthree\nfour\n". (The bug fabricated a
# bogus "\n" from the phantom row and clobbered the register.)
[[cases]]
name = "register_survives_noop_visual_line_delete"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "VGdVGd"
expected_buffer = ""
expected_mode = "normal"

# Same no-op family through the `dd` path.
[[cases]]
name = "register_survives_noop_dd"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "VGddd"
expected_buffer = ""
expected_mode = "normal"

# Same no-op family through the operator+motion path (`dG`).
[[cases]]
name = "register_survives_noop_dG"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "VGddG"
expected_buffer = ""
expected_mode = "normal"

# NEGATIVE — deleting a REAL blank line is NOT a no-op: one '\n' is removed
# and the register gets "\n". Guards the no-op check against over-reach.
[[cases]]
name = "register_dd_on_real_blank_line"
initial_buffer = "a\n\nb\n"
initial_cursor = [1, 0]
keys = "dd"
expected_buffer = "a\nb\n"
expected_mode = "normal"
