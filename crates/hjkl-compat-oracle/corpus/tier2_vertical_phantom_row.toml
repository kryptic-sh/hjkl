# Tier 2 — B1: vertical motions must not step onto ropey's phantom trailing
# row.
#
# `len_lines()` on a rope always counts one extra empty "line" after a
# trailing `\n` (the empty remainder after the last line terminator). Vim
# treats that trailing `\n` as a line *terminator*, not a separator, so the
# phantom row must never be a landing spot for `j`/`gj`/`G` and friends. `G`
# was already fixed for this; these cases pin the same rule for `j`/`k` and
# combinations, plus the genuinely-empty-last-line case that must NOT be
# clamped away.
#
# Live nvim compare.

# `j` on a single-line buffer (no real second line) must be a no-op — the
# only "row 1" available is the phantom trailing row.
[[cases]]
name = "phantom_row_j_single_line_noop"
initial_buffer = "baz\n"
initial_cursor = [0, 0]
keys = "j"
expected_buffer = "baz\n"
expected_cursor = [0, 0]
expected_mode = "normal"

# `jj` on a real two-line buffer lands on the last real line, not one past it.
[[cases]]
name = "phantom_row_jj_two_lines"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "jj"
expected_buffer = "foo\nbar\n"
expected_cursor = [1, 0]
expected_mode = "normal"

# `G` then `j`: `G` already lands on the last content row; a further `j` must
# stay there (no phantom row below it).
[[cases]]
name = "phantom_row_G_then_j_stays"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "Gj"
expected_buffer = "foo\nbar\n"
expected_cursor = [1, 0]
expected_mode = "normal"

# `jx`: `j` must land on the real second line so `x` deletes its first char.
[[cases]]
name = "phantom_row_jx_deletes_on_real_line"
initial_buffer = "foo\nbar\n"
initial_cursor = [0, 0]
keys = "jx"
expected_buffer = "foo\nar\n"
expected_cursor = [1, 0]
expected_mode = "normal"

# CAUTION case: "foo\n\n" has a genuinely empty *second* line (row 1) that is
# NOT the phantom row (the phantom row would be row 2). `j` must still reach
# the real empty row 1.
[[cases]]
name = "real_empty_last_line_j_reaches_it"
initial_buffer = "foo\n\n"
initial_cursor = [0, 0]
keys = "j"
expected_buffer = "foo\n\n"
expected_cursor = [1, 0]
expected_mode = "normal"

# Same buffer: `jj` must stop at row 1 (the real empty line) — no phantom
# row 2 to advance into.
[[cases]]
name = "real_empty_last_line_jj_stops"
initial_buffer = "foo\n\n"
initial_cursor = [0, 0]
keys = "jj"
expected_buffer = "foo\n\n"
expected_cursor = [1, 0]
expected_mode = "normal"

# Edge case: a buffer that is just `"\n"` is a single empty line. `j` is a
# no-op (no phantom row to land on).
[[cases]]
name = "lone_newline_buffer_j_noop"
initial_buffer = "\n"
initial_cursor = [0, 0]
keys = "j"
expected_buffer = "\n"
expected_cursor = [0, 0]
expected_mode = "normal"

# Edge case: `k` from the last real line of a trailing-newline buffer must
# still walk up correctly (sanity check that the fix doesn't disturb `k`).
[[cases]]
name = "phantom_row_k_from_last_real_line"
initial_buffer = "foo\nbar\n"
initial_cursor = [1, 0]
keys = "k"
expected_buffer = "foo\nbar\n"
expected_cursor = [0, 0]
expected_mode = "normal"

# ── Linewise deletes reaching EOF must not park the cursor on the phantom row
# (V1). These pin the phantom-row clamp for the Visual-line delete path, which
# — unlike `dd` and the motion-driven operator path — previously lacked it.

# `VGd` deletes every line: the buffer empties to "" (not "\n"), the register
# captures exactly the four lines with a single trailing newline (no phantom
# extra `\n`), and the cursor sits at the origin.
[[cases]]
name = "phantom_row_VGd_empties_buffer"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "VGd"
expected_buffer = ""
expected_cursor = [0, 0]
expected_register = ['"', "one\ntwo\nthree\nfour\n"]
expected_mode = "normal"

# `jVjjd` — Visual-line delete of rows 1..3 (through the last real line) must
# land the cursor on the surviving "one" row (0), NOT the phantom trailing row.
[[cases]]
name = "phantom_row_visual_line_delete_through_eof"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "jVjjd"
expected_buffer = "one\n"
expected_cursor = [0, 0]
expected_register = ['"', "two\nthree\nfour\n"]
expected_mode = "normal"

# `Vd` on the last real line only: cursor pulls back to the new last content
# row ("three"), not the phantom trailing row.
[[cases]]
name = "phantom_row_visual_line_delete_last_line"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [3, 0]
keys = "Vd"
expected_buffer = "one\ntwo\nthree\n"
expected_cursor = [2, 0]
expected_register = ['"', "four\n"]
expected_mode = "normal"

# Non-EOF Visual-line delete is unchanged: deleting rows 1..2 lands on the
# join row ("four" at row 1), same as before the phantom clamp was added.
[[cases]]
name = "visual_line_delete_non_eof_unchanged"
initial_buffer = "one\ntwo\nthree\nfour\n"
initial_cursor = [0, 0]
keys = "jVjd"
expected_buffer = "one\nfour\n"
expected_cursor = [1, 0]
expected_register = ['"', "two\nthree\n"]
expected_mode = "normal"
