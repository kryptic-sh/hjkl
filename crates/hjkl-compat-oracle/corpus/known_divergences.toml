# Cases here are confirmed hjkl engine divergences from neovim semantics.
# Each is tracked under issue #24 (engine vim-compat divergences) — see that
# issue for status. The oracle runs these in cron CI to surface progress
# (which still pass / which begin to pass) but failures here do NOT fail CI.
#
# `expected_buffer` / `expected_cursor` hold NEOVIM's behaviour. The oracle
# reports each case as still-diverging until hjkl matches, at which point it
# should be promoted back to its tier corpus.
#
# The substitute ex-command cases that formerly lived here have graduated to
# corpus/nvim_api_tier.toml — they pass via `hjkl --nvim-api` and are now
# asserted by the `nvim_api_tier_passes` test.
#
# All 5 cases that were parked here (mark_dot_jump_to_last_edit,
# register_blackhole_d, gi_resume_last_insert, count_100G_clamps_to_last_line,
# visual_block_jl_c_change_block) were fixed in hjkl-engine 0.5.8 and
# re-promoted to their tier-2 corpus files (kryptic-sh/hjkl#83).

# ─── di{ inner-block linewise-promotion quirks ───────────────────────────────
# vim's `current_block` ("i{") has two subtle multi-line behaviours hjkl does
# not yet replicate. The common cases (single-line, clean multi-line, nested,
# count, cursor-on-brace) all pass in tier2_text_objects; only these remain.

# Whitespace-only body: vim PRESERVES a body line that is only whitespace —
# `di{` is effectively a no-op on the content. hjkl currently deletes the
# blank line (treats it as empty inner content).
[[cases]]
name = "textobj_di_curlybrace_ws_only_body_DIVERGES"
initial_buffer = "{\n   \n}\n"
initial_cursor = [1, 1]
keys = "di{"
expected_buffer = "{\n   \n}\n"
expected_cursor = [1, 0]

# Open-brace line carries trailing content: vim's linewise inner delete also
# strips the open line's trailing text, collapsing to `{` / `}` on bare lines.
# hjkl keeps the open line's trailing content (`{ a`).
[[cases]]
name = "textobj_di_curlybrace_open_trailing_DIVERGES"
initial_buffer = "{ a\n  b\n}\n"
initial_cursor = [1, 2]
keys = "di{"
expected_buffer = "{\n}\n"
expected_cursor = [0, 0]
