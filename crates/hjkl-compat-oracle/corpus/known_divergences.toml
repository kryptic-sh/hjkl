# Cases here are confirmed hjkl engine divergences from neovim semantics.
# Each is tracked under issue #24 (engine vim-compat divergences) — see that
# issue for status. The oracle runs these in cron CI to surface progress
# (which still pass / which begin to pass) but failures here do NOT fail CI.

# DIVERGENCE: G lands on phantom row 3 (past last line) instead of row 2
[[cases]]
name = "motion_G_file_bottom"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 0]
keys = "G"
expected_buffer = "foo\nbar\nbaz\n"
expected_cursor = [2, 0]

# DIVERGENCE: after dd on last line, hjkl cursor stays at row 1 (past end)
# instead of clamping to row 0 (the new last line)
[[cases]]
name = "operator_dd_last_line"
initial_buffer = "foo\nbar\n"
initial_cursor = [1, 0]
keys = "dd"
expected_buffer = "foo\n"
expected_cursor = [0, 0]

# DIVERGENCE: after d$, hjkl cursor col is 5 (past last char) instead of 4
# on "hello\n"; off-by-one in post-operator cursor clamp
[[cases]]
name = "operator_d_dollar_to_eol"
initial_buffer = "hello world\n"
initial_cursor = [0, 5]
keys = "d$"
expected_buffer = "hello\n"
expected_cursor = [0, 4]

# DIVERGENCE: da" in hjkl does not eat the adjacent whitespace after the
# closing quote; leaves "say  there\n" (double space) vs nvim's "say there\n"
[[cases]]
name = "textobj_da_doublequote"
initial_buffer = "say \"hello\" there\n"
initial_cursor = [0, 6]
keys = "da\""
expected_buffer = "say there\n"
expected_cursor = [0, 4]

# DIVERGENCE: after daB on multiline brace block, hjkl cursor col is 7
# instead of nvim's 6; off-by-one in post-daB cursor placement
[[cases]]
name = "textobj_daB_delete_around_brace"
initial_buffer = "fn x() {\n    body\n}\n"
initial_cursor = [1, 4]
keys = "daB"
expected_buffer = "fn x() \n"
expected_cursor = [0, 6]

# DIVERGENCE: diB on "{\n    body\n}\n" — hjkl collapses to "{}\n" (deletes
# all newlines inside braces), nvim correctly leaves "{\n}\n"
[[cases]]
name = "textobj_diB_delete_inner_brace"
initial_buffer = "{\n    body\n}\n"
initial_cursor = [1, 4]
keys = "diB"
expected_buffer = "{\n}\n"
expected_cursor = [1, 0]

# DIVERGENCE: hjkl does not fill the default register on x/X; nvim puts
# deleted chars into `"` so they can be retrieved with p/P
[[cases]]
name = "count_5x_delete_chars"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = "5x"
expected_buffer = " world\n"
expected_cursor = [0, 0]
expected_register = ['"', "hello"]

# DIVERGENCE: after `a word<Esc>u`, hjkl cursor col is 5 (one past the
# last char of "hello") instead of 4; undo does not clamp cursor to last-valid col
[[cases]]
name = "undo_insert_then_u"
initial_buffer = "hello\n"
initial_cursor = [0, 5]
keys = "a world<Esc>u"
expected_buffer = "hello\n"
expected_cursor = [0, 4]

# ─── Substitute ex-command cases ─────────────────────────────────────────────
# DIVERGENCE: hjkl-engine's `step` function does not handle the `:` key — ex
# commands are dispatched through `hjkl_editor::ex::run` by the TUI host, not
# through the vim FSM. These cases exercise nvim's `:s` via the oracle's key
# replay but the hjkl driver will see `:s/foo/bar/<CR>` as unrecognised Normal
# mode keys and leave the buffer unchanged. The substitute logic itself is
# tested in hjkl-editor and apps/hjkl unit tests.

# DIVERGENCE: :s/foo/bar/ — basic substitute, first match on current line
[[cases]]
name = "substitute_basic_first_match"
initial_buffer = "foo foo\n"
initial_cursor = [0, 0]
keys = ":s/foo/bar/<CR>"
expected_buffer = "bar foo\n"
expected_cursor = [0, 0]

# DIVERGENCE: :%s/foo/bar/g — global substitute over whole buffer
[[cases]]
name = "substitute_percent_global"
initial_buffer = "foo\nfoo foo\n"
initial_cursor = [0, 0]
keys = ":%s/foo/bar/g<CR>"
expected_buffer = "bar\nbar bar\n"
expected_cursor = [1, 0]

# DIVERGENCE: :s/\d\+/N/g — digit pattern using vim's \d\+ notation
[[cases]]
name = "substitute_digit_pattern"
initial_buffer = "foo 123 bar 456\n"
initial_cursor = [0, 0]
keys = ":s/[0-9][0-9]*/N/g<CR>"
expected_buffer = "foo N bar N\n"
expected_cursor = [0, 0]

# DIVERGENCE: :s/foo/bar/ with no match — buffer unchanged, cursor unchanged
[[cases]]
name = "substitute_no_match_noop"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":s/xyz/bar/<CR>"
expected_buffer = "hello world\n"
expected_cursor = [0, 0]
