# Tier 2 macros corpus — ~6 cases covering `q<reg>...q` record + `@<reg>`
# playback, count-driven playback, `@@` repeat-last.
#
# All buffers are ASCII-only.

# Record `dw` into register a, then play once.
[[cases]]
name = "macro_record_dw_play_at"
initial_buffer = "foo bar baz qux\n"
initial_cursor = [0, 0]
keys = "qadwq@a"
expected_buffer = "baz qux\n"
expected_cursor = [0, 0]

# Record insert `iX<Esc>`, then play to insert another X.
[[cases]]
name = "macro_record_insert_play"
initial_buffer = "abc\n"
initial_cursor = [0, 0]
keys = "qaiX<Esc>q@a"
expected_buffer = "XXabc\n"

# `5@a` plays macro 5 times.
[[cases]]
name = "macro_count_5at_deletes_5_words"
initial_buffer = "a b c d e f g h\n"
initial_cursor = [0, 0]
keys = "qadwq5@a"
expected_buffer = "g h\n"
expected_cursor = [0, 0]

# `@@` repeats last-played macro.
[[cases]]
name = "macro_at_at_repeats_last"
initial_buffer = "a b c d e\n"
initial_cursor = [0, 0]
keys = "qadwq@a@@"
expected_buffer = "d e\n"
expected_cursor = [0, 0]

# `@z` with empty register z is a no-op.
[[cases]]
name = "macro_empty_register_noop"
initial_buffer = "hello\n"
initial_cursor = [0, 0]
keys = "@z"
expected_buffer = "hello\n"
expected_cursor = [0, 0]

# Record A+text+Esc+motion into 'a' on line0, then replay on line1.
# Regression: app-layer `@{reg}` chord replay was dropping every key after
# the first because route_chord_key returned false for insert-mode chars
# and the caller discarded the return value (engine path works fine; this
# corpus case pins the engine semantics so future refactors can't drift).
[[cases]]
name = "macro_record_A_text_esc_motion_replays_full"
initial_buffer = "line0\nline1\nline2\nline3\n"
initial_cursor = [0, 0]
keys = "qaAtest<Esc>0jq@a"
expected_buffer = "line0test\nline1test\nline2\nline3\n"
expected_cursor = [2, 0]
