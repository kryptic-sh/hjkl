# Tier 2 visual-block corpus — 5 cases covering <C-v> blockwise operations.
#
# All buffers are ASCII-only ("foo\nbar\nbaz\n" gives consistent 3-char rows).
# Cursor positions: 0-based (row, col).
# Note: `<C-v>` is the ctrl-v key (enters visual-block mode).

# ─── Blockwise delete ────────────────────────────────────────────────────────

# `<C-v>jld` deletes a 2-row, 2-col block starting at (0,0).
# "foo\nbar\n" — block covers cols 0-1 of rows 0-1 → removes "fo" and "ba".
[[cases]]
name = "visual_block_jl_d_delete_block"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 0]
keys = "<C-v>jld"
expected_buffer = "o\nr\nbaz\n"
expected_cursor = [0, 0]

# ─── Blockwise toggle case ────────────────────────────────────────────────────

# `<C-v>jl~` toggles case of a 2-row, 2-col block.
[[cases]]
name = "visual_block_jl_tilde_togglecase"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 0]
keys = "<C-v>jl~"
expected_buffer = "FOo\nBAr\nbaz\n"
expected_cursor = [0, 0]

# ─── Blockwise insert ────────────────────────────────────────────────────────

# `<C-v>jI<text><Esc>` prepends text to each row of the block.
# After Esc, each row in the block starts with the inserted text.
[[cases]]
name = "visual_block_j_I_insert_before_block"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 0]
keys = "<C-v>jIXX<Esc>"
expected_buffer = "XXfoo\nXXbar\nbaz\n"
expected_cursor = [0, 0]

# ─── Blockwise append ────────────────────────────────────────────────────────

# `<C-v>jA<text><Esc>` appends text after col of cursor on each row.
# Block at col 0 with `A` appends after col 0 (i.e. after the first char).
[[cases]]
name = "visual_block_j_A_append_after_block"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 2]
keys = "<C-v>jA!<Esc>"
expected_buffer = "foo!\nbar!\nbaz\n"
expected_cursor = [0, 2]

# ─── Blockwise change ────────────────────────────────────────────────────────

# `<C-v>jlc<text><Esc>` — cursor lands on the last char of the inserted text
# after block-change exits insert mode (col 1 for "ZZ"). Buffer correct too.
[[cases]]
name = "visual_block_jl_c_change_block"
initial_buffer = "foo\nbar\nbaz\n"
initial_cursor = [0, 0]
keys = "<C-v>jlcZZ<Esc>"
expected_buffer = "ZZo\nZZr\nbaz\n"
expected_cursor = [0, 1]

# ─── Blockwise append with a ragged short line (G5) ──────────────────────────

# `<C-v>jjllA` selects a 3-row, 3-col block; row 1 ("ab") is shorter than the
# block's right edge and must be padded with spaces up to the append column
# before the typed text lands, rather than being skipped (that's `I`'s rule,
# not `A`'s — see `:h v_b_A` / `replicate_block_text`'s `pad` doc).
[[cases]]
name = "visual_block_A_pads_ragged_short_line"
initial_buffer = "abcdef\nab\nabcdef\n"
initial_cursor = [0, 0]
keys = "<C-v>jjllAX<Esc>"
expected_buffer = "abcXdef\nab X\nabcXdef\n"
expected_cursor = [0, 0]
expected_mode = "normal"

# `I` at a non-zero left edge also lands the cursor on that edge — the
# existing `visual_block_j_I_insert_before_block` case starts at col 0,
# which happens to mask an off-by-one in the generic Esc step-back
# interaction (see `visual_block_insert_at_left`'s doc comment).
[[cases]]
name = "visual_block_I_nonzero_left_edge"
initial_buffer = "foobar\nfoobar\n"
initial_cursor = [0, 0]
keys = "0ll<C-v>jIXX<Esc>"
expected_buffer = "foXXobar\nfoXXobar\n"
expected_cursor = [0, 2]
expected_mode = "normal"
