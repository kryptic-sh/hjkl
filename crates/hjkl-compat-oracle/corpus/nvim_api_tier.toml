# cexpr "2:1:a", then cexpr "4:1:b", then :colder, then :cc
# → restores list A; cc jumps to entry at line 2 (0-based row=1 col=0).
[[cases]]
name = "colder_restores_list_a_then_cc"
initial_buffer = "line1\nline2\nline3\nline4\nline5\nline6\n"
initial_cursor = [0, 0]
keys = ":set errorformat=%l:%c:%m<CR>:cexpr \"2:1:a\"<CR>:cexpr \"4:1:b\"<CR>:colder<CR>:cc<CR>"
expected_buffer = "line1\nline2\nline3\nline4\nline5\nline6\n"
expected_cursor = [1, 0]

# ...then :cnewer, then :cc → restores list B; cc jumps to entry at line 4
