# This corpus exercises functionality that requires ex-command dispatch and is
# driven via `hjkl --nvim-api` subprocess (not in-process key replay).
#
# The in-process oracle driver replays keys through the vim FSM; it cannot
# dispatch `:` ex commands (those go through `hjkl_editor::ex::run` in the TUI
# host). The nvim-api subprocess driver routes `nvim_command(...)` directly
# through `ex::run`, so these cases pass there but not via in-process replay.

# :s/foo/bar/ — basic substitute, first match on current line
[[cases]]
name = "substitute_basic_first_match"
initial_buffer = "foo foo\n"
initial_cursor = [0, 0]
keys = ":s/foo/bar/<CR>"
expected_buffer = "bar foo\n"
expected_cursor = [0, 0]

# :%s/foo/bar/g — global substitute over whole buffer
[[cases]]
name = "substitute_percent_global"
initial_buffer = "foo\nfoo foo\n"
initial_cursor = [0, 0]
keys = ":%s/foo/bar/g<CR>"
expected_buffer = "bar\nbar bar\n"
expected_cursor = [1, 0]

# :s/\d\+/N/g — digit pattern using vim's \d\+ notation
[[cases]]
name = "substitute_digit_pattern"
initial_buffer = "foo 123 bar 456\n"
initial_cursor = [0, 0]
keys = ":s/[0-9][0-9]*/N/g<CR>"
expected_buffer = "foo N bar N\n"
expected_cursor = [0, 0]

# :s/foo/bar/ with no match — buffer unchanged, cursor unchanged
[[cases]]
name = "substitute_no_match_noop"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":s/xyz/bar/<CR>"
expected_buffer = "hello world\n"
expected_cursor = [0, 0]

# :syntax off — buffer unchanged (vim-compat no-op as far as content)
[[cases]]
name = "syntax_off_noop"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":syntax off<CR>"
expected_buffer = "hello world\n"
expected_cursor = [0, 0]

# :syntax on — buffer unchanged
[[cases]]
name = "syntax_on_noop"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":syntax on<CR>"
expected_buffer = "hello world\n"
expected_cursor = [0, 0]

# :syn off — vim-style 3-char abbreviation
[[cases]]
name = "syntax_abbrev_syn_off"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":syn off<CR>"
expected_buffer = "hello world\n"
expected_cursor = [0, 0]

# :syntax enable — alias for :syntax on
[[cases]]
name = "syntax_enable_noop"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":syntax enable<CR>"
expected_buffer = "hello world\n"
expected_cursor = [0, 0]

# :redraw — plain repaint, no buffer/cursor change
[[cases]]
name = "redraw_noop"
initial_buffer = "hello world\n"
initial_cursor = [0, 0]
keys = ":redraw<CR>"
expected_buffer = "hello world\n"
expected_cursor = [0, 0]

