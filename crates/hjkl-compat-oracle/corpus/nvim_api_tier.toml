# :retab — leading tab → 4 spaces when expandtab is set (#207)
[[cases]]
name = "retab_leading_tabs_to_spaces"
initial_buffer = "\thello\n"
initial_cursor = [0, 0]
keys = ":set expandtab tabstop=4<CR>:retab<CR>"
expected_buffer = "    hello\n"
expected_cursor = [0, 0]

# :retab! — internal tab converted too when bang is given (#207)
[[cases]]
name = "retab_bang_internal_whitespace"
initial_buffer = "a\tb\n"
initial_cursor = [0, 0]
keys = ":set expandtab tabstop=4<CR>:retab!<CR>"
expected_buffer = "a   b\n"
expected_cursor = [0, 0]

# :retab — noexpandtab, 8 leading spaces → two tabs (#207)
[[cases]]
name = "retab_noexpandtab_spaces_to_tabs"
initial_buffer = "        hello\n"
initial_cursor = [0, 0]
keys = ":set noexpandtab tabstop=4<CR>:retab<CR>"
expected_buffer = "\t\thello\n"
expected_cursor = [0, 0]

# g& — repeat last :s over whole buffer (#211)
# :s/foo/X/ substitutes line 0 only; g& repeats s/foo/X/ over all three lines.
# No /g flag → first match per line. Cursor lands on last substituted line (2).
[[cases]]
name = "g_ampersand_repeats_substitute_on_all_lines"
initial_buffer = "foo\nfoo bar\nfoo baz\n"
initial_cursor = [0, 0]
keys = ":s/foo/X/<CR>g&"
expected_buffer = "X\nX bar\nX baz\n"
expected_cursor = [2, 0]

# g& with /g flag — all matches per line replaced on re-apply (#211)
# :s/foo/X/g turns line 0 into "X X"; g& re-applies s/foo/X/g over all lines.
# Line 0 already has no "foo"; line 1 ("foo") becomes "X".
# Cursor lands on last substituted line (1).
[[cases]]
name = "g_ampersand_with_g_flag"
initial_buffer = "foo foo\nfoo\n"
initial_cursor = [0, 0]
keys = ":s/foo/X/g<CR>g&"
expected_buffer = "X X\nX\n"
expected_cursor = [1, 0]

# ── smartcase + \c/\C case logic (#186) ──────────────────────────────────────
#
# These cases verify hjkl-only default settings (ignorecase=true,
# smartcase=true). They cannot be compared against nvim --clean (which
# defaults to noignorecase) so they live here in the nvim_api_tier corpus,
# which exercises only hjkl.

# smartcase lowercase pattern matches uppercase (#186).
# ic+smart=true (default). "/foo<CR>" from [0,0] on "foo\nFOO\nbar".
# "foo" all-lowercase → Insensitive → matches FOO. vim skips "foo" at cursor,
# finds "FOO" at [1,0]. Verified against nvim v0.12.2 with :set ic smart: [1,0].
[[cases]]
name = "smartcase_lowercase_pattern_matches_uppercase"
initial_buffer = "foo\nFOO\nbar\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>/foo<CR>"
expected_buffer = "foo\nFOO\nbar\n"
expected_cursor = [1, 0]

# smartcase uppercase pattern — sensitive, no match on lower or upper (#186).
# ic+smart=true. "/Foo<CR>" from [0,0] — uppercase → Sensitive.
# Neither "foo" nor "FOO" is exactly "Foo"; cursor stays at [0,0].
# Verified against nvim v0.12.2 with :set ic smart: [0,0].
[[cases]]
name = "smartcase_uppercase_pattern_no_match_on_lower_or_upper"
initial_buffer = "foo\nFOO\nbar\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>/Foo<CR>"
expected_buffer = "foo\nFOO\nbar\n"
expected_cursor = [0, 0]

# \c inline override forces insensitive even though pattern has uppercase (#186).
# ic+smart=true. "/\cFoo<CR>" from [0,0] on "bar\nFOO\nbaz".
# \c overrides Sensitive (which "Foo" would trigger) → Insensitive → matches FOO.
# From [0,0] ("bar") finds "FOO" at [1,0].
# Verified against nvim v0.12.2 with :set ic smart: [1,0].
[[cases]]
name = "lower_c_override_finds_uppercase"
initial_buffer = "bar\nFOO\nbaz\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>/\\cFoo<CR>"
expected_buffer = "bar\nFOO\nbaz\n"
expected_cursor = [1, 0]

# \C inline override forces sensitive even with ignorecase+smartcase on (#186).
# ic+smart=true. "/foo\C<CR>" — \C forces Sensitive → only exact "foo" matches.
# Buffer "FOO\nbar" has no lowercase "foo" → cursor stays at [0,0].
# Verified against nvim v0.12.2 with :set ic smart: [0,0].
[[cases]]
name = "upper_c_override_skips_case_insensitive_match"
initial_buffer = "FOO\nbar\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>/foo\\C<CR>"
expected_buffer = "FOO\nbar\n"
expected_cursor = [0, 0]

# :s/foo/bar/i on "Foo" — /i flag forces case-insensitive override (#186).
# With ic+smart=true, all-lower "foo" → Insensitive anyway, but /i flag
# also explicitly forces it. Buffer "Foo" → replaced with "bar".
# Verified against nvim v0.12.2 with :set ic smart + :s/foo/bar/i: "bar", [0,0].
[[cases]]
name = "substitute_i_flag_overrides_pattern_case"
initial_buffer = "Foo\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>:s/foo/bar/i<CR>"
expected_buffer = "bar\n"
expected_cursor = [0, 0]

# ─── gw reflow (cursor-stable) ───────────────────────────────────────────────

# `gw$` — reflow single long line to textwidth=20, cursor stays at original col.
# Initial: "aaa bbb ccc ddd eee fff ggg hhh", cursor at [0,5].
# After `gw$` with tw=20: "aaa bbb ccc ddd eee" / "fff ggg hhh".
# Cursor must stay at [0,5] (the 'b' in "bbb" — character-preserving).
# Verified against nvim v0.12.2: cursor [0,5].
[[cases]]
name = "gw_dollar_reflows_keeps_cursor_at_original_col"
initial_buffer = "aaa bbb ccc ddd eee fff ggg hhh\n"
initial_cursor = [0, 5]
keys = ":set tw=20<CR>gw$"
expected_buffer = "aaa bbb ccc ddd eee\nfff ggg hhh\n"
expected_cursor = [0, 5]

# `gww` — doubled form reflows current line to textwidth=20, cursor stable.
# Same buffer and tw as above; cursor at [0,5]. `gww` reflows only the
# current line (like `gqq` but cursor-preserving).
# Verified against nvim v0.12.2: cursor [0,5].
[[cases]]
name = "gww_reflows_current_line_cursor_stable"
initial_buffer = "aaa bbb ccc ddd eee fff ggg hhh\n"
initial_cursor = [0, 5]
keys = ":set tw=20<CR>gww"
expected_buffer = "aaa bbb ccc ddd eee\nfff ggg hhh\n"
expected_cursor = [0, 5]

# `gw$` — cursor follows character across wrapped line boundary.
# "abcdefgh ijklmnopqrstuvwxyz", tw=8, cursor at col 20 ('t').
# After reflow: "abcdefgh" / "ijklmnopqrstuvwxyz".
# 't' is at col 11 in line 1 (i=0..t=11).
# Verified against nvim v0.12.2: cursor [1,11].
[[cases]]
name = "gw_dollar_follows_character_across_wrap_boundary"
initial_buffer = "abcdefgh ijklmnopqrstuvwxyz\n"
initial_cursor = [0, 20]
keys = ":set tw=8<CR>gw$"
expected_buffer = "abcdefgh\nijklmnopqrstuvwxyz\n"
expected_cursor = [1, 11]

# ─── vim modeline integration (#205) ─────────────────────────────────────────
#
# These cases verify that vim modelines embedded in buffer content are picked
# up and applied before :retab runs. nvim_driver spawns nvim with
# `--cmd "set modeline modelines=5"` so modeline is active during the test.
#
# hjkl parses modelines in build_slot at file-open time; the oracle exercises
# the same parse→apply path by seeding the initial_buffer with a modeline and
# then running :retab to observe the tabstop/expandtab effect.

# modeline ts=2 et: tab on line 2 becomes 2 spaces after :retab.
# Modeline "# vim: ts=2 et:" sets ts=2 + expandtab.
# "\thello" → "  hello" (2 spaces).
# Cursor at [0,0]; :retab does not move cursor.
# Verified against nvim v0.12.2 with modeline+modelines=5 active: [0,0].
[[cases]]
name = "modeline_ts2_affects_retab"
initial_buffer = "# vim: set ts=2 et:\n\thello\n"
initial_cursor = [0, 0]
keys = ":retab<CR>"
expected_buffer = "# vim: set ts=2 et:\n  hello\n"
expected_cursor = [0, 0]

# modeline noet: expandtab=false — 4 spaces → \t after :retab.
# "# vim: ts=4 noet:" → tabstop=4, expandtab=false.
# "    hello" (4 spaces) → "\thello".
# Cursor at [0,0].
# Verified against nvim v0.12.2 with modeline+modelines=5 active: [0,0].
[[cases]]
name = "modeline_noet_disables_expandtab"
initial_buffer = "# vim: ts=4 noet:\n    hello\n"
initial_cursor = [0, 0]
keys = ":retab<CR>"
expected_buffer = "# vim: ts=4 noet:\n\thello\n"
expected_cursor = [0, 0]

# modeline in last line: modeline at the bottom of the file is also scanned.
# Buffer has tab-indented content on line 1 and modeline on line 3 (the last).
# ts=2 et from the last-line modeline → "\thello" → "  hello" after :retab.
# Cursor at [0,0].
# Verified against nvim v0.12.2 with modeline+modelines=5 active: [0,0].
[[cases]]
name = "modeline_in_last_line"
initial_buffer = "\thello\nfoo\n# vim: set ts=2 et:\n"
initial_cursor = [0, 0]
keys = ":retab<CR>"
expected_buffer = "  hello\nfoo\n# vim: set ts=2 et:\n"
expected_cursor = [0, 0]

# ── :earlier / :later time-travel undo (#212) ────────────────────────────────
#
# These cases create undo history via :s/…/…/ (pure ex-command path) so that
# the driver's nvim_command routing handles everything without needing the FSM
# insert-mode → ex-mode transition (which isn't supported in nvim_input replay).
#
# Cursor values verified against nvim v0.12.2:
#   vim.cmd('s/foo/bar/') vim.cmd('earlier 1') → cursor [1,0] → 0-based (0,0)
#   vim.cmd('s/foo/bar/') vim.cmd('earlier 1') vim.cmd('later 1') → cursor [1,0] → (0,0)
#   vim.cmd('s/hello/world/') vim.cmd('earlier 5') → cursor [1,0] → (0,0)

# :earlier 1 — undo the most recent change via ex-command step count.
# :s/foo/bar/ creates one undo entry; :earlier 1 restores "foo".
# Cursor at (0, 0) — verified against nvim v0.12.2.
[[cases]]
name = "earlier_1_undoes_one_step"
initial_buffer = "foo\n"
initial_cursor = [0, 0]
keys = ":s/foo/bar/<CR>:earlier 1<CR>"
expected_buffer = "foo\n"
expected_cursor = [0, 0]

# :later 1 — redo the undone change.
# After :earlier 1 restores "foo", :later 1 returns to "bar".
# Cursor at (0, 0) — verified against nvim v0.12.2.
[[cases]]
name = "later_1_redoes_one_step"
initial_buffer = "foo\n"
initial_cursor = [0, 0]
keys = ":s/foo/bar/<CR>:earlier 1<CR>:later 1<CR>"
expected_buffer = "bar\n"
expected_cursor = [0, 0]

# :earlier 5 with only 1 available change — caps at history depth, no error.
# Only one undo entry from :s/hello/world/; :earlier 5 undoes that one step.
# Cursor at (0, 0) — verified against nvim v0.12.2.
[[cases]]
name = "earlier_5_caps_at_history"
initial_buffer = "hello\n"
initial_cursor = [0, 0]
keys = ":s/hello/world/<CR>:earlier 5<CR>"
expected_buffer = "hello\n"
expected_cursor = [0, 0]

# ─── linewise change preserves first-line indent (autoindent on) ──────────────
#
# hjkl defaults autoindent on; nvim --clean defaults it off, so each case
# prefixes ":set autoindent<CR>" to put BOTH sides in the same mode. cc/cj/Vc
# all leave one line carrying the changed line's leading whitespace; cursor on
# the last inserted char. Verified against nvim v0.12.2 with :set autoindent.

# cc on an indented line keeps the indent, replaces content.
[[cases]]
name = "change_cc_preserves_indent"
initial_buffer = "fn f() {\n    a;\n    b;\n}\n"
initial_cursor = [1, 4]
keys = ":set autoindent<CR>ccbar<Esc>"
expected_buffer = "fn f() {\n    bar\n    b;\n}\n"
expected_cursor = [1, 6]

# cj (change current + line below) collapses to one indented line.
[[cases]]
name = "change_cj_preserves_indent_one_line"
initial_buffer = "fn f() {\n    a;\n    b;\n}\n"
initial_cursor = [1, 4]
keys = ":set autoindent<CR>cjbar<Esc>"
expected_buffer = "fn f() {\n    bar\n}\n"
expected_cursor = [1, 6]

# Vjc (visual-line change of two rows) — same as cj.
[[cases]]
name = "change_visual_line_preserves_indent"
initial_buffer = "fn f() {\n    a;\n    b;\n}\n"
initial_cursor = [1, 4]
keys = ":set autoindent<CR>Vjcbar<Esc>"
expected_buffer = "fn f() {\n    bar\n}\n"
expected_cursor = [1, 6]

# ck (change current + line above) — top row is the unindented `fn f() {`,
# so the surviving line has no indent.
[[cases]]
name = "change_ck_uses_top_line_indent"
initial_buffer = "fn f() {\n    a;\n    b;\n}\n"
initial_cursor = [1, 4]
keys = ":set autoindent<CR>ckbar<Esc>"
expected_buffer = "bar\n    b;\n}\n"
expected_cursor = [0, 2]

# :set nomodifiable — buffer must be unchanged after ix<Esc>
[[cases]]
name = "nomodifiable_blocks_insert_ix"
initial_buffer = "hello\n"
initial_cursor = [0, 0]
keys = ":set nomodifiable<CR>ix<Esc>"
expected_buffer = "hello\n"
expected_cursor = [0, 0]

# :set readonly — buffer IS editable; ix<Esc> inserts 'x' at col 0
[[cases]]
name = "readonly_allows_insert_ix"
initial_buffer = "hello\n"
initial_cursor = [0, 0]
keys = ":set readonly<CR>ix<Esc>"
expected_buffer = "xhello\n"
expected_cursor = [0, 0]

# ── :cexpr / :cgetexpr / :caddexpr (#261 Phase 5a) ───────────────────────────

# :cexpr with %l:%c:%m errorformat and a two-line quoted string — jumps to the
# first entry (line 3 col 2, 0-based: row=2 col=1).
# nvim probe: `cexpr "3:2:three\\n5:1:five"` → row=2 col=1 (verified).
[[cases]]
name = "cexpr_jumps_to_first"
initial_buffer = "line1\nline2\nline3\nline4\nline5\n"
initial_cursor = [0, 0]
keys = ":set errorformat=%l:%c:%m<CR>:cexpr \"3:2:three\\n5:1:five\"<CR>"
expected_buffer = "line1\nline2\nline3\nline4\nline5\n"
expected_cursor = [2, 1]

# :cexpr then :cnext — moves cursor to the second entry (line 5 col 1,
# 0-based: row=4 col=0).
# nvim probe: same cexpr then cnext → row=4 col=0 (verified).
[[cases]]
name = "cexpr_then_cnext"
initial_buffer = "line1\nline2\nline3\nline4\nline5\n"
initial_cursor = [0, 0]
keys = ":set errorformat=%l:%c:%m<CR>:cexpr \"3:2:three\\n5:1:five\"<CR>:cnext<CR>"
expected_buffer = "line1\nline2\nline3\nline4\nline5\n"
expected_cursor = [4, 0]

# :cgetexpr — populates without jumping (cursor stays at row 0).
# nvim probe: cgetexpr "2:0:two" → row=0 col=0 (verified).
[[cases]]
name = "cgetexpr_no_jump"
initial_buffer = "line1\nline2\nline3\nline4\nline5\n"
initial_cursor = [0, 0]
keys = ":set errorformat=%l:%c:%m<CR>:cgetexpr \"2:0:two\"<CR>"
expected_buffer = "line1\nline2\nline3\nline4\nline5\n"
expected_cursor = [0, 0]

# :cgetexpr then :cfirst — populates via cgetexpr (no jump), then cfirst
# jumps to entry 0 (line 2, 0-based row=1 col=0).
# nvim probe: cgetexpr "2:0:two" then cfirst → row=1 col=0 (verified).
[[cases]]
name = "cgetexpr_then_cfirst"
initial_buffer = "line1\nline2\nline3\nline4\nline5\n"
initial_cursor = [0, 0]
keys = ":set errorformat=%l:%c:%m<CR>:cgetexpr \"2:0:two\"<CR>:cfirst<CR>"
expected_buffer = "line1\nline2\nline3\nline4\nline5\n"
expected_cursor = [1, 0]

# :caddexpr — populates via cgetexpr then appends via caddexpr, then cnext
# navigates from first (row 1) to second entry (row 3).
# nvim probe: cgetexpr "2:0:two", caddexpr "4:1:four", cnext → row=3 col=0 (verified).
[[cases]]
name = "caddexpr_append_then_cnext"
initial_buffer = "line1\nline2\nline3\nline4\nline5\n"
initial_cursor = [0, 0]
keys = ":set errorformat=%l:%c:%m<CR>:cgetexpr \"2:0:two\"<CR>:caddexpr \"4:1:four\"<CR>:cnext<CR>"
expected_buffer = "line1\nline2\nline3\nline4\nline5\n"
expected_cursor = [3, 0]

# ── :cbuffer / :caddbuffer (#261 Phase 5b) ────────────────────────────────────

# :cbuffer with %l:%c:%m errorformat parses buffer lines "1:1:a","2:1:b","3:1:c"
# and jumps to the first entry (line 1 col 1, 0-based: row=0 col=0).
# nvim probe: buffer={"1:1:a","2:1:b","3:1:c"}, set efm=%l:%c:%m, :cbuffer
# → cursor row=0 col=0 (verified).
[[cases]]
name = "cbuffer_jumps_to_first"
initial_buffer = "1:1:a\n2:1:b\n3:1:c\n"
initial_cursor = [0, 0]
keys = ":set errorformat=%l:%c:%m<CR>:cbuffer<CR>"
expected_buffer = "1:1:a\n2:1:b\n3:1:c\n"
expected_cursor = [0, 0]

# :cbuffer then :cnext — moves cursor to the second entry (line 2 col 1,
# 0-based: row=1 col=0).
# nvim probe: same buffer+cbuffer then :cnext → cursor row=1 col=0 (verified).
[[cases]]
name = "cbuffer_then_cnext"
initial_buffer = "1:1:a\n2:1:b\n3:1:c\n"
initial_cursor = [0, 0]
keys = ":set errorformat=%l:%c:%m<CR>:cbuffer<CR>:cnext<CR>"
expected_buffer = "1:1:a\n2:1:b\n3:1:c\n"
expected_cursor = [1, 0]

# :cgetbuffer — populates without jumping (cursor stays at row 0 col 0).
# nvim probe: same buffer, cgetbuffer → cursor unchanged at [0,0] (verified).
[[cases]]
name = "cgetbuffer_no_jump"
initial_buffer = "1:1:a\n2:1:b\n3:1:c\n"
initial_cursor = [0, 0]
keys = ":set errorformat=%l:%c:%m<CR>:cgetbuffer<CR>"
