# :retab — leading tab → 4 spaces when expandtab is set (#207)
[[cases]]
name = "retab_leading_tabs_to_spaces"
initial_buffer = "\thello\n"
initial_cursor = [0, 0]
keys = ":set expandtab tabstop=4<CR>:retab<CR>"
expected_buffer = "    hello\n"
expected_cursor = [0, 0]

# :retab! — internal tab converted too when bang is given (#207)
[[cases]]
name = "retab_bang_internal_whitespace"
initial_buffer = "a\tb\n"
initial_cursor = [0, 0]
keys = ":set expandtab tabstop=4<CR>:retab!<CR>"
expected_buffer = "a   b\n"
expected_cursor = [0, 0]

# :retab — noexpandtab, 8 leading spaces → two tabs (#207)
[[cases]]
name = "retab_noexpandtab_spaces_to_tabs"
initial_buffer = "        hello\n"
initial_cursor = [0, 0]
keys = ":set noexpandtab tabstop=4<CR>:retab<CR>"
expected_buffer = "\t\thello\n"
expected_cursor = [0, 0]

# g& — repeat last :s over whole buffer (#211)
# :s/foo/X/ substitutes line 0 only; g& repeats s/foo/X/ over all three lines.
# No /g flag → first match per line. Cursor lands on last substituted line (2).
[[cases]]
name = "g_ampersand_repeats_substitute_on_all_lines"
initial_buffer = "foo\nfoo bar\nfoo baz\n"
initial_cursor = [0, 0]
keys = ":s/foo/X/<CR>g&"
expected_buffer = "X\nX bar\nX baz\n"
expected_cursor = [2, 0]

# g& with /g flag — all matches per line replaced on re-apply (#211)
# :s/foo/X/g turns line 0 into "X X"; g& re-applies s/foo/X/g over all lines.
# Line 0 already has no "foo"; line 1 ("foo") becomes "X".
# Cursor lands on last substituted line (1).
[[cases]]
name = "g_ampersand_with_g_flag"
initial_buffer = "foo foo\nfoo\n"
initial_cursor = [0, 0]
keys = ":s/foo/X/g<CR>g&"
expected_buffer = "X X\nX\n"
expected_cursor = [1, 0]

# ── smartcase + \c/\C case logic (#186) ──────────────────────────────────────
#
# These cases verify hjkl-only default settings (ignorecase=true,
# smartcase=true). They cannot be compared against nvim --clean (which
# defaults to noignorecase) so they live here in the nvim_api_tier corpus,
# which exercises only hjkl.

# smartcase lowercase pattern matches uppercase (#186).
# ic+smart=true (default). "/foo<CR>" from [0,0] on "foo\nFOO\nbar".
# "foo" all-lowercase → Insensitive → matches FOO. vim skips "foo" at cursor,
# finds "FOO" at [1,0]. Verified against nvim v0.12.2 with :set ic smart: [1,0].
[[cases]]
name = "smartcase_lowercase_pattern_matches_uppercase"
initial_buffer = "foo\nFOO\nbar\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>/foo<CR>"
expected_buffer = "foo\nFOO\nbar\n"
expected_cursor = [1, 0]

# smartcase uppercase pattern — sensitive, no match on lower or upper (#186).
# ic+smart=true. "/Foo<CR>" from [0,0] — uppercase → Sensitive.
# Neither "foo" nor "FOO" is exactly "Foo"; cursor stays at [0,0].
# Verified against nvim v0.12.2 with :set ic smart: [0,0].
[[cases]]
name = "smartcase_uppercase_pattern_no_match_on_lower_or_upper"
initial_buffer = "foo\nFOO\nbar\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>/Foo<CR>"
expected_buffer = "foo\nFOO\nbar\n"
expected_cursor = [0, 0]

# \c inline override forces insensitive even though pattern has uppercase (#186).
# ic+smart=true. "/\cFoo<CR>" from [0,0] on "bar\nFOO\nbaz".
# \c overrides Sensitive (which "Foo" would trigger) → Insensitive → matches FOO.
# From [0,0] ("bar") finds "FOO" at [1,0].
# Verified against nvim v0.12.2 with :set ic smart: [1,0].
[[cases]]
name = "lower_c_override_finds_uppercase"
initial_buffer = "bar\nFOO\nbaz\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>/\\cFoo<CR>"
expected_buffer = "bar\nFOO\nbaz\n"
expected_cursor = [1, 0]

# \C inline override forces sensitive even with ignorecase+smartcase on (#186).
# ic+smart=true. "/foo\C<CR>" — \C forces Sensitive → only exact "foo" matches.
# Buffer "FOO\nbar" has no lowercase "foo" → cursor stays at [0,0].
# Verified against nvim v0.12.2 with :set ic smart: [0,0].
[[cases]]
name = "upper_c_override_skips_case_insensitive_match"
initial_buffer = "FOO\nbar\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>/foo\\C<CR>"
expected_buffer = "FOO\nbar\n"
expected_cursor = [0, 0]

# :s/foo/bar/i on "Foo" — /i flag forces case-insensitive override (#186).
# With ic+smart=true, all-lower "foo" → Insensitive anyway, but /i flag
# also explicitly forces it. Buffer "Foo" → replaced with "bar".
# Verified against nvim v0.12.2 with :set ic smart + :s/foo/bar/i: "bar", [0,0].
[[cases]]
name = "substitute_i_flag_overrides_pattern_case"
initial_buffer = "Foo\n"
initial_cursor = [0, 0]
keys = ":set ignorecase smartcase<CR>:s/foo/bar/i<CR>"
expected_buffer = "bar\n"
expected_cursor = [0, 0]

# ─── gw reflow (cursor-stable) ───────────────────────────────────────────────

# `gw$` — reflow single long line to textwidth=20, cursor stays at original col.
# Initial: "aaa bbb ccc ddd eee fff ggg hhh", cursor at [0,5].
# After `gw$` with tw=20: "aaa bbb ccc ddd eee" / "fff ggg hhh".
# Cursor must stay at [0,5] (the 'b' in "bbb" — character-preserving).
# Verified against nvim v0.12.2: cursor [0,5].
[[cases]]
name = "gw_dollar_reflows_keeps_cursor_at_original_col"
initial_buffer = "aaa bbb ccc ddd eee fff ggg hhh\n"
initial_cursor = [0, 5]
keys = ":set tw=20<CR>gw$"
expected_buffer = "aaa bbb ccc ddd eee\nfff ggg hhh\n"
expected_cursor = [0, 5]

# `gww` — doubled form reflows current line to textwidth=20, cursor stable.
# Same buffer and tw as above; cursor at [0,5]. `gww` reflows only the
# current line (like `gqq` but cursor-preserving).
# Verified against nvim v0.12.2: cursor [0,5].
[[cases]]
name = "gww_reflows_current_line_cursor_stable"
initial_buffer = "aaa bbb ccc ddd eee fff ggg hhh\n"
initial_cursor = [0, 5]
keys = ":set tw=20<CR>gww"
expected_buffer = "aaa bbb ccc ddd eee\nfff ggg hhh\n"
expected_cursor = [0, 5]

# `gw$` — cursor follows character across wrapped line boundary.
# "abcdefgh ijklmnopqrstuvwxyz", tw=8, cursor at col 20 ('t').
# After reflow: "abcdefgh" / "ijklmnopqrstuvwxyz".
# 't' is at col 11 in line 1 (i=0..t=11).
# Verified against nvim v0.12.2: cursor [1,11].
[[cases]]
name = "gw_dollar_follows_character_across_wrap_boundary"
initial_buffer = "abcdefgh ijklmnopqrstuvwxyz\n"
initial_cursor = [0, 20]
keys = ":set tw=8<CR>gw$"
expected_buffer = "abcdefgh\nijklmnopqrstuvwxyz\n"
expected_cursor = [1, 11]

# ─── vim modeline integration (#205) ─────────────────────────────────────────
#
# These cases verify that vim modelines embedded in buffer content are picked
# up and applied before :retab runs. nvim_driver spawns nvim with
# `--cmd "set modeline modelines=5"` so modeline is active during the test.
#
# hjkl parses modelines in build_slot at file-open time; the oracle exercises
# the same parse→apply path by seeding the initial_buffer with a modeline and
# then running :retab to observe the tabstop/expandtab effect.

# modeline ts=2 et: tab on line 2 becomes 2 spaces after :retab.
# Modeline "# vim: ts=2 et:" sets ts=2 + expandtab.
# "\thello" → "  hello" (2 spaces).
# Cursor at [0,0]; :retab does not move cursor.
# Verified against nvim v0.12.2 with modeline+modelines=5 active: [0,0].
[[cases]]
name = "modeline_ts2_affects_retab"
initial_buffer = "# vim: set ts=2 et:\n\thello\n"
initial_cursor = [0, 0]
keys = ":retab<CR>"
expected_buffer = "# vim: set ts=2 et:\n  hello\n"
expected_cursor = [0, 0]

# modeline noet: expandtab=false — 4 spaces → \t after :retab.
# "# vim: ts=4 noet:" → tabstop=4, expandtab=false.
# "    hello" (4 spaces) → "\thello".
# Cursor at [0,0].
# Verified against nvim v0.12.2 with modeline+modelines=5 active: [0,0].
[[cases]]
name = "modeline_noet_disables_expandtab"
initial_buffer = "# vim: ts=4 noet:\n    hello\n"
initial_cursor = [0, 0]
keys = ":retab<CR>"
expected_buffer = "# vim: ts=4 noet:\n\thello\n"
expected_cursor = [0, 0]

# modeline in last line: modeline at the bottom of the file is also scanned.
# Buffer has tab-indented content on line 1 and modeline on line 3 (the last).
# ts=2 et from the last-line modeline → "\thello" → "  hello" after :retab.
# Cursor at [0,0].
# Verified against nvim v0.12.2 with modeline+modelines=5 active: [0,0].
[[cases]]
name = "modeline_in_last_line"
initial_buffer = "\thello\nfoo\n# vim: set ts=2 et:\n"
initial_cursor = [0, 0]
keys = ":retab<CR>"
expected_buffer = "  hello\nfoo\n# vim: set ts=2 et:\n"
expected_cursor = [0, 0]
