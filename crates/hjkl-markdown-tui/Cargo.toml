[package]
name = "hjkl-markdown-tui"
description = "Ratatui adapter for hjkl-markdown: converts markdown events to ratatui Lines for inline rendering."
keywords = ["markdown", "tui", "ratatui", "editor"]
categories = ["text-editors", "command-line-interface"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
hjkl-markdown.workspace = true
ratatui = "0.30"
unicode-width.workspace = true

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
