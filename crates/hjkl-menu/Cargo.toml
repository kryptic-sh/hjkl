[package]
name = "hjkl-menu"
description = "Renderer-agnostic context menu data model for the hjkl editor stack. MenuAction hierarchy, open/close state, keyboard navigation, accelerator matching, and dispatch. Rendering lives in hjkl-menu-tui / hjkl-menu-gui."
keywords = ["editor", "menu", "context-menu", "vim", "tui"]
categories = ["text-editors"]
version = "0.2.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
