[package]
name = "hjkl-keymap-gui"
description = "Floem KeyEvent → hjkl-keymap KeyEvent adapter. The floem GUI-side input boundary for hjkl, per the -tui adapter convention."
keywords = ["editor", "keymap", "floem", "gui"]
categories = ["gui"]
version.workspace = true
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"
# publish=false — workspace-only. Consumers (hjkl-editor-gui, apps/hjkl-gui)
# are themselves publish=false, so this adapter never needs to resolve from
# crates.io.
publish = false

[dependencies]
floem = "0.2"
hjkl-keymap.workspace = true
