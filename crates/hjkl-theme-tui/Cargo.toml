[package]
name = "hjkl-theme-tui"
description = "Ratatui adapters for hjkl-theme: Color/StyleSpec/Modifiers conversions."
keywords = ["theme", "ratatui", "tui", "color", "editor"]
categories = ["text-editors", "command-line-interface"]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
hjkl-theme = { path = "../hjkl-theme", version = "0.1" }
ratatui = "0.30"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
