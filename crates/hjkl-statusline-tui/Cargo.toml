[package]
name = "hjkl-statusline-tui"
description = "ratatui adapter for hjkl-statusline: renders the renderer-agnostic statusline model into a ratatui Line / widget."
keywords = ["editor", "statusline", "vim", "tui", "ratatui"]
categories = ["text-editors", "command-line-interface"]
version = "0.2.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
hjkl-statusline = "0.2"
ratatui = "0.30"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
