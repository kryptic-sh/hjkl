# cargo-nextest config.
#
# nextest runs each test in its own process, in parallel. Two groups of tests
# in this workspace require serialization for different reasons.
#
# ── clipboard-display ────────────────────────────────────────────────────────
# `hjkl-clipboard`'s X11/Wayland backend tests serialize themselves with an
# in-process `static TEST_LOCK: Mutex<()>` and bind a mock display at a fixed
# name (`DISPLAY=:98` for X11, a fixed socket for Wayland). The Mutex only
# serializes threads *within one test binary* — under nextest each test is its
# own process, so the lock is per-process and useless, and parallel processes
# collide on the same mock display (symptom: "MockManager received wrong
# payload bytes", spurious unwrap panics). `cargo test`'s single-binary thread
# pool happened to honour the Mutex.
#
# ── anvil-env ────────────────────────────────────────────────────────────────
# `hjkl-anvil`'s XDG path-resolution and full-pipeline tests mutate
# `XDG_DATA_HOME` / `XDG_CACHE_HOME` via `std::env::set_var`. An in-process
# `static ENV_LOCK: Mutex<()>` serializes them within a single `cargo test`
# binary, but nextest's process-per-test model makes that lock useless across
# processes. This group caps concurrent anvil test processes to 1 — same
# effect as `--test-threads=1` but only for hjkl-anvil. The other ~1800+
# workspace tests stay fully parallel.
#
# Proper fix (follow-up): use `std::env::var` lookup-at-call-time + per-test
# temp dir injection so no global env mutation is needed.
#
# ── grammar-cache ────────────────────────────────────────────────────────────
# The `#[ignore]`'d real-grammar tests (run only by the dedicated "grammar
# tests" CI job via `--run-ignored all`) build tree-sitter grammars on demand:
# bonsai clones `tree-sitter-rust` into a SHARED cache dir
# (`~/.cache/bonsai/grammars/rust-<rev>.tmp`) and compiles it. Under nextest
# each test is its own process, so two grammar tests for the same grammar race
# on the identical tmp clone dir — symptoms observed in CI: ubuntu `git fetch …
# No such file or directory` (one process removed the tmp dir mid-fetch) and
# macOS `git init … cannot copy fsmonitor-watchman.sample: File exists` (two
# `git init` into the same .git template at once). Capping this group to 1 lets
# the first test fully populate the cache; the rest hit it warm — no clone race.
# These tests don't run in the normal `--workspace` lane (they're ignored), so
# this override has zero effect there.

[test-groups]
clipboard-display = { max-threads = 1 }
anvil-env = { max-threads = 1 }
grammar-cache = { max-threads = 1 }
pty-e2e = { max-threads = 1 }
oracle-serial = { max-threads = 1 }

[profile.default]
# Hard per-test timeout so a deadlocked test is SIGKILLed + reported by name
# instead of hanging the whole CI job forever (#264: `test ubuntu-latest`
# hung >24h with no signal). 120s × 4 = an 8-minute ceiling — far above any
# real unit/integration/pty-e2e test, while cold tree-sitter grammar builds
# (the slowest legit work, in the separate `--run-ignored` grammar job) finish
# well under it. nextest prints `SLOW` at each period, naming the culprit.
slow-timeout = { period = "120s", terminate-after = 4 }

[[profile.default.overrides]]
# The hjkl-compat-oracle tests that drive `hjkl --nvim-api` spawn a heavy
# subprocess each; under nextest's process-per-test parallelism a batch of them
# saturates a constrained runner and the tail can't finish within the timeout
# (#264: the same 3 nvim-api oracle tests deterministically timed out at the end
# of the ubuntu run, while macOS/Windows/local — with more headroom — passed).
# Run the oracle binary's tests one at a time, like pty-e2e. The in-process
# corpus tests are sub-millisecond so the serial cost is dominated by the few
# subprocess tests, which were already the bottleneck.
filter = 'package(hjkl-compat-oracle)'
test-group = 'oracle-serial'

[[profile.default.overrides]]
filter = 'package(hjkl-clipboard)'
test-group = 'clipboard-display'

[[profile.default.overrides]]
filter = 'package(hjkl-anvil)'
test-group = 'anvil-env'

[[profile.default.overrides]]
# All grammar-cloning bonsai fold tests share the on-disk grammar cache; run
# them one at a time so they don't race on the same `<grammar>.tmp` clone dir.
# `all_bundled_fold_queries_compile` clones every bundled grammar, so it must be
# in this group too (it does not match `/rust_fold/`).
filter = 'package(hjkl-bonsai) & (test(/rust_fold/) | test(/all_bundled_fold/))'
test-group = 'grammar-cache'

[[profile.default.overrides]]
# The `e2e` integration test drives the real `hjkl` binary under a real pty and
# scrapes the rendered screen. Concurrent pty sessions contend on terminal
# resources and timing (the harness asserts on a settled screen), so under a
# high core-count `-j` they spuriously fail — e.g. the indent / autoreload (#242)
# suites. The e2e doc already mandates `--test-threads=1`; this enforces the same
# under nextest's process-per-test model regardless of host core count.
filter = 'package(hjkl) & binary(e2e)'
test-group = 'pty-e2e'
