[workspace]
resolver = "2"
members = ["crates/*", "apps/*"]

[workspace.package]
version = "0.24.3"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[workspace.dependencies]
hjkl-anvil = { path = "crates/hjkl-anvil", version = "0.24" }
hjkl-app = { path = "crates/hjkl-app", version = "0.24" }
hjkl-bonsai = { path = "crates/hjkl-bonsai", version = "0.24" }
hjkl-buffer = { path = "crates/hjkl-buffer", version = "0.24" }
hjkl-clipboard = { path = "crates/hjkl-clipboard", version = "0.24" }
hjkl-completion-tui = { path = "crates/hjkl-completion-tui", version = "0.24" }
hjkl-config = { path = "crates/hjkl-config", version = "0.24" }
hjkl-editor = { path = "crates/hjkl-editor", version = "0.24", default-features = false }
hjkl-editor-gui = { path = "crates/hjkl-editor-gui", version = "0.24" }
hjkl-editor-tui = { path = "crates/hjkl-editor-tui", version = "0.24", default-features = false }
hjkl-engine = { path = "crates/hjkl-engine", version = "0.24", default-features = false }
hjkl-ex = { path = "crates/hjkl-ex", version = "0.24" }
hjkl-form = { path = "crates/hjkl-form", version = "0.24" }
hjkl-fs-watch = { path = "crates/hjkl-fs-watch", version = "0.24" }
hjkl-holler = { path = "crates/hjkl-holler", version = "0.24" }
hjkl-holler-tui = { path = "crates/hjkl-holler-tui", version = "0.24" }
hjkl-hover = { path = "crates/hjkl-hover", version = "0.24" }
hjkl-hover-tui = { path = "crates/hjkl-hover-tui", version = "0.24" }
hjkl-info-popup = { path = "crates/hjkl-info-popup", version = "0.24" }
hjkl-info-popup-tui = { path = "crates/hjkl-info-popup-tui", version = "0.24" }
hjkl-keymap = { path = "crates/hjkl-keymap", version = "0.24", default-features = false }
hjkl-keymap-crossterm = { path = "crates/hjkl-keymap-crossterm", version = "0.24" }
hjkl-layout = { path = "crates/hjkl-layout", version = "0.24" }
hjkl-lsp = { path = "crates/hjkl-lsp", version = "0.24" }
hjkl-mangler = { path = "crates/hjkl-mangler", version = "0.24" }
hjkl-markdown = { path = "crates/hjkl-markdown", version = "0.24" }
hjkl-markdown-tui = { path = "crates/hjkl-markdown-tui", version = "0.24" }
hjkl-menu = { path = "crates/hjkl-menu", version = "0.24" }
hjkl-menu-tui = { path = "crates/hjkl-menu-tui", version = "0.24" }
hjkl-picker = { path = "crates/hjkl-picker", version = "0.24" }
hjkl-picker-tui = { path = "crates/hjkl-picker-tui", version = "0.24" }
hjkl-prompt = { path = "crates/hjkl-prompt", version = "0.24" }
hjkl-prompt-tui = { path = "crates/hjkl-prompt-tui", version = "0.24" }
hjkl-ratatui = { path = "crates/hjkl-ratatui", version = "0.24" }
hjkl-splash = { path = "crates/hjkl-splash", version = "0.24" }
hjkl-statusline = { path = "crates/hjkl-statusline", version = "0.24" }
hjkl-statusline-tui = { path = "crates/hjkl-statusline-tui", version = "0.24" }
hjkl-syntax = { path = "crates/hjkl-syntax", version = "0.24" }
hjkl-syntax-tui = { path = "crates/hjkl-syntax-tui", version = "0.24" }
hjkl-tabs = { path = "crates/hjkl-tabs", version = "0.24" }
hjkl-tabs-tui = { path = "crates/hjkl-tabs-tui", version = "0.24" }
hjkl-theme = { path = "crates/hjkl-theme", version = "0.24" }
hjkl-theme-tui = { path = "crates/hjkl-theme-tui", version = "0.24" }
hjkl-vim = { path = "crates/hjkl-vim", version = "0.24", default-features = false }
hjkl-which-key = { path = "crates/hjkl-which-key", version = "0.24" }
hjkl-which-key-tui = { path = "crates/hjkl-which-key-tui", version = "0.24" }
hjkl-xdg = { path = "crates/hjkl-xdg", version = "0.24" }

[profile.release]
lto = "thin"
codegen-units = 1
