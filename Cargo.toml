[workspace]
resolver = "2"
members = ["crates/*"]
exclude = ["crates/hjkl-engine/fuzz"]

[workspace.package]
version = "0.0.18"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[profile.release]
lto = "thin"
codegen-units = 1
