[package]
name = "hjkl-tree-sitter"
description = "Generic tree-sitter syntax highlighting for the hjkl editor stack"
keywords = ["tree-sitter", "syntax-highlighting", "editor", "vim", "tui"]
categories = ["text-editors", "parsing"]
version = "0.4.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-tree-sitter"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
tree-sitter = "0.26"
tree-sitter-rust = "0.24"
tree-sitter-md = "0.5"
tree-sitter-json = "0.24"
tree-sitter-toml-ng = "0.7"
tree-sitter-sequel = "0.3"
toml = "1.1"
serde = { version = "1", features = ["derive"] }
anyhow = "1"
ratatui = "0.30"
tree-sitter-python = "0.25"
tree-sitter-typescript = "0.23"
tree-sitter-go = "0.25"
tree-sitter-yaml = "0.7"
tree-sitter-bash = "0.25"
tree-sitter-c = "0.24"
tree-sitter-html = "0.23"
tree-sitter-css = "0.25"
tree-sitter-javascript = "0.25"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
