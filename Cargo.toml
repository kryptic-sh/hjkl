[package]
name = "hjkl-bonsai"
description = "Tree-sitter grammar registry + highlighter for the hjkl editor stack"
keywords = ["tree-sitter", "syntax-highlighting", "editor", "vim", "tui"]
categories = ["text-editors", "parsing"]
version = "0.4.1"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-bonsai"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
tree-sitter = "0.26"
tree-sitter-language = "0.1"
toml = "1.1"
serde = { version = "1", features = ["derive"] }
anyhow = "1"
ratatui = "0.30"
libloading = "0.8"
dirs = "6"

[dev-dependencies]
tempfile = "3"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
