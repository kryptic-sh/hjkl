[package]
name = "hjkl-clipboard"
description = "Cross-platform clipboard library with rich types, async support, and OSC 52 fallback for SSH"
keywords = ["clipboard", "osc52", "ssh", "editor", "tui"]
categories = ["text-editors", "command-line-utilities"]
version = "0.4.3"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-clipboard"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[dependencies]
miniz_oxide = "0.8"

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[dev-dependencies]
pollster = "0.3"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
