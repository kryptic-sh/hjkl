[workspace]
resolver = "2"

[workspace.package]
version = "0.3.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-clipboard"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[profile.release]
lto = "thin"
codegen-units = 1

[package]
name = "hjkl-clipboard"
description = "Unified clipboard sink for the hjkl editor stack (arboard + OSC 52 fallback)"
keywords = ["clipboard", "osc52", "ssh", "editor", "tui"]
categories = ["text-editors", "command-line-utilities"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
homepage.workspace = true
readme = "README.md"

[dependencies]
arboard = "3"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
