[workspace]
resolver = "2"
members = ["crates/*", "apps/*"]

[workspace.package]
version = "0.9.2"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[patch.crates-io]
hjkl-buffer = { path = "crates/hjkl-buffer" }
hjkl-clipboard = { path = "crates/hjkl-clipboard" }
hjkl-editor = { path = "crates/hjkl-editor" }
hjkl-engine = { path = "crates/hjkl-engine" }
hjkl-form = { path = "crates/hjkl-form" }
hjkl-picker = { path = "crates/hjkl-picker" }
hjkl-ratatui = { path = "crates/hjkl-ratatui" }
hjkl-bonsai = { path = "crates/hjkl-bonsai" }
hjkl-config = { path = "crates/hjkl-config" }

[profile.release]
lto = "thin"
codegen-units = 1
