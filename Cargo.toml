[workspace]
resolver = "2"

[workspace.package]
version = "0.3.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kryptic-sh/hjkl-tree-sitter"
authors = ["mxaddict <mxaddict@kryptic.sh>"]
rust-version = "1.95"
homepage = "https://hjkl.kryptic.sh"
readme = "README.md"

[profile.release]
lto = "thin"
codegen-units = 1

[package]
name = "hjkl-tree-sitter"
description = "Generic tree-sitter syntax highlighting for the hjkl editor stack"
keywords = ["tree-sitter", "syntax-highlighting", "editor", "vim", "tui"]
categories = ["text-editors", "parsing"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
homepage.workspace = true
readme = "README.md"

[dependencies]
tree-sitter = "0.26"
tree-sitter-rust = "0.24"
tree-sitter-md = "0.5"
tree-sitter-json = "0.24"
tree-sitter-toml-ng = "0.7"
tree-sitter-sequel = "0.3"
toml = "1.1"
serde = { version = "1", features = ["derive"] }
anyhow = "1"
ratatui = "0.30"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
